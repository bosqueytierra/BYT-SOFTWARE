<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compras - BYT SOFTWARE</title>
  <link rel="stylesheet" href="../../styles/global.css">
  <style>
    :root { --bg:#f6f7f8; --card:#fff; --border:#d4d8dd; --text:#2d2d2d; --muted:#6c7a86; --primary:#2e5e4e; --shadow:0 6px 16px rgba(0,0,0,0.06); }
    html, body { width:100%; min-height:100vh; display:block; }
    body { margin:0; font-family:"Inter","SF Pro Display","Roboto",system-ui,sans-serif; background:var(--bg); color:var(--text); }
    .page { width:100%; max-width:1800px; margin:16px auto 48px; padding:0 16px; display:block; }
    .header-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px; box-shadow:var(--shadow); display:flex; justify-content:space-between; gap:14px; align-items:center; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px; box-shadow:var(--shadow); width:100%; }
    .block-list { display:flex !important; flex-direction:column; gap:14px; width:100%; }
    .block-header { display:flex; justify-content:space-between; gap:12px; align-items:center; flex-wrap:wrap; }
    .meta { color:var(--muted); font-size:13px; font-weight:600; }
    .chips { display:flex; gap:8px; flex-wrap:wrap; }
    .chip { background:#eef2f5; color:#2d2d2d; border-radius:10px; padding:4px 10px; border:1px solid var(--border); font-size:13px; }
    .btn { border:1px solid var(--border); background:#fff; color:#1f2430; padding:6px 10px; border-radius:6px; cursor:pointer; font-weight:600; font-size:13px; display:inline-flex; align-items:center; gap:6px; transition:background .12s ease; height:30px; box-shadow:none; }
    .btn:hover { background:#eef2f5; }
    .btn-primary { background:var(--primary); color:#fff; border-color:var(--primary); }
    .btn-primary:hover { background:#264d40; }
    .btn-ghost { background:#f4f5f6; color:#1f2430; border-color:#d4d8dd; }
    .empty { text-align:center; color:#6c7a86; padding:24px 12px; border:1px dashed var(--border); border-radius:12px; background:#fff; }

    body.overlay-open { overflow:hidden; }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: none; align-items: center; justify-content: center; z-index: 9999; padding: 10px; }
    .overlay.active { display: flex; }
    .overlay-content { background: #f8f9fb; border-radius: 10px; box-shadow: 0 18px 60px rgba(0,0,0,0.30); width: 98vw; max-width: 2200px; height: 92vh; padding: 10px; overflow: hidden; display: flex; flex-direction: column; gap: 8px; }
    .overlay-header { display:flex; justify-content:space-between; align-items:center; gap:8px; flex-wrap:wrap; }
    .overlay-title { font-weight: 700; font-size: 15px; }
    .lines-wrapper { width:100%; overflow:auto; background:#fff; border:1px solid var(--border); border-radius:8px; padding:8px; }
    .table-wrapper { width:100%; overflow:auto; }
    table.lc-table { border-collapse: collapse; width: 100%; min-width: 1500px; }
    table.lc-table thead th { position: sticky; top: 0; background:#e1e5ec; border:1px solid #d7dbe0; padding:6px 6px; font-size:12.5px; font-weight:700; }
    table.lc-table tbody td { border:1px solid #d7dbe0; background:#fff; padding:0; min-height:28px; }
    table.lc-table tbody tr:nth-child(odd) td { background:#f7f8fa; }
    table.lc-table select, table.lc-table input[type=number], table.lc-table input[type=text] { width:100%; height:28px; font-size:13px; padding:2px 6px; box-sizing:border-box; border:none; background:transparent; outline:none; }
    table.lc-table input[type=number] { appearance:none; -moz-appearance:textfield; }
    table.lc-table input::-webkit-outer-spin-button, table.lc-table input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .readonly-cell { background:#f3f4f6; }

    .action-cell { display:flex; gap:6px; justify-content:center; align-items:center; }
    .icon-btn {
      width:32px; height:32px; border:1px solid #d4d8dd; border-radius:8px;
      background:#f8f9fb; display:flex; align-items:center; justify-content:center;
      cursor:pointer; padding:0; transition:background .12s ease, border-color .12s ease, color .12s ease;
      color:#cfd5e3;
    }
    .icon-btn:hover { background:#eef2f7; border-color:#c6cbd3; color:#e6ebf2; }
    .icon-btn svg { width:17px; height:17px; stroke: currentColor; fill: none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }

    .estado-comprado { background:#d9ecc1 !important; color:#1f2a37 !important; }
    .estado-stock     { background:#35714e !important; color:#ffffff !important; }
    .estado-porcomprar{ background:#a22116 !important; color:#ffffff !important; }

    .section-title { margin:12px 0 8px; font-weight:800; color:#1f2430; display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none; }
    .section-body { transition:max-height .2s ease; overflow:hidden; }
    .badge-pill { padding:4px 10px; border-radius:999px; font-weight:700; font-size:12px; border:1px solid #d4d8dd; background:#f4f5f6; }
    .panel { padding:10px; border-radius:10px; border:1px solid #e6e7eb; box-shadow: inset 0 1px 0 rgba(255,255,255,0.6); }
    .panel-por { background:rgba(0,0,0,0.03); }
    .panel-ent { background:rgba(0,0,0,0.06); }
    .arrow { transition:transform .15s ease; font-size:14px; color:#444; }
    .arrow.up { transform:rotate(180deg); }

    /* Producto + catálogo */
    .prod-cell{display:flex;align-items:center;gap:6px;padding:2px 4px;}
    .prod-select{flex:1;}
    .btn-search{width:30px;height:28px;border:1px solid #d4d8dd;border-radius:6px;background:#f7f9fb;cursor:pointer;}
    .prod-label{width:100%;margin-top:2px;min-height:26px;font-size:12.5px;padding:4px 6px;border:1px solid #d7dbe0;border-radius:6px;background:#fff;box-sizing:border-box;}
    .prod-pill{display:flex;align-items:center;gap:6px;padding:4px 8px;border:1px solid #d4d8dd;border-radius:10px;background:#eef2f5;font-size:12.5px;}
    .prod-pill strong{font-weight:700;}
    .btn-clear-prod{border:none;background:transparent;color:#a11;cursor:pointer;font-weight:700;}
    .hidden{display:none !important;}

    /* Overlay catálogo layout */
    .catalog-layout{display:flex;gap:10px;height:100%;}
    .catalog-filters{width:240px;flex-shrink:0;background:#fff;border:1px solid #d4d8dd;border-radius:10px;padding:10px;overflow:auto;}
    .catalog-results{flex:1;display:flex;flex-direction:column;gap:8px;}
    .filter-group{margin-bottom:12px;}
    .filter-group label{font-size:12px;font-weight:700;color:#333;display:block;margin-bottom:6px;}
    .filter-group input, .filter-group select{width:100%;height:30px;padding:4px 6px;font-size:13px;box-sizing:border-box;}
    .range-row{display:flex;gap:6px;}
    .range-row input{flex:1;}
    .chips-wrap{display:flex;flex-direction:column;gap:6px;}
    .chip-check{display:flex;align-items:center;gap:6px;font-size:13px;}
  </style>
</head>
<body>
  <div class="page">
    <div class="header-card">
      <div>
        <h1 style="margin:0;">Compras</h1>
        <p class="meta" style="margin:4px 0 0;">Bloques de compras generados al aprobar cotizaciones</p>
      </div>
    </div>

    <div class="panel panel-por">
      <div class="section-title" id="togglePorEntregar">
        <span class="arrow" id="arrowPor">▼</span>
        <span style="font-size:16px; font-weight:800;">Proyectos por entregar</span>
        <span class="badge-pill" id="countPorEntregar">0</span>
      </div>
      <div class="section-body" id="bodyPorEntregar">
        <div id="blocksContainer" class="block-list"></div>
        <div id="emptyState" class="empty" style="display:none;">No hay proyectos por entregar.</div>
      </div>
    </div>

    <div class="panel panel-ent" style="margin-top:12px;">
      <div class="section-title" id="toggleEntregados">
        <span class="arrow up" id="arrowEnt">▼</span>
        <span style="font-size:16px; font-weight:800;">Proyectos entregados</span>
        <span class="badge-pill" id="countEntregados">0</span>
      </div>
      <div class="section-body" id="bodyEntregados" style="max-height:0;">
        <div id="blocksEntregados" class="block-list"></div>
        <div id="emptyEntregados" class="empty" style="display:none;">No hay proyectos entregados.</div>
      </div>
    </div>
  </div>

  <div id="overlay" class="overlay">
    <div class="overlay-content">
      <div class="overlay-header">
        <div class="overlay-title" id="overlayTitle">Ver resumen</div>
        <div style="display:flex; gap:8px; align-items:center;">
          <button class="btn" id="closeOverlay">Cerrar</button>
        </div>
      </div>
      <div class="lines-wrapper">
        <div id="overlayGrid"></div>
      </div>
    </div>
  </div>

  <div id="overlayLC" class="overlay">
    <div class="overlay-content" data-current-block="">
      <div class="overlay-header">
        <div class="overlay-title" id="overlayLCTitle">Lista de compras</div>
        <div style="display:flex; gap:8px; align-items:center;">
          <button class="btn" id="addRowBtn">Agregar fila</button>
          <button class="btn" id="closeOverlayLC">Cerrar</button>
        </div>
      </div>
      <div class="lines-wrapper">
        <div id="overlayLCGrid"></div>
      </div>
    </div>
  </div>

  <!-- Overlay catálogo externo -->
  <div id="overlayProduct" class="overlay">
    <div class="overlay-content" style="max-width:1200px;height:80vh;">
      <div class="overlay-header">
        <div class="overlay-title">Buscar producto catálogo</div>
        <div style="display:flex;gap:8px;align-items:center;">
          <input id="prodSearchInput" type="text" placeholder="Buscar..." style="width:260px;padding:6px 8px;">
          <select id="prodVendorFilter" style="height:30px;">
            <option value="">Todos los vendors</option>
            <option value="IMPERIAL">IMPERIAL</option>
          </select>
          <select id="prodOrder" style="height:30px;">
            <option value="name-asc">Nombre A-Z</option>
            <option value="price-asc">Precio ↑</option>
            <option value="price-desc">Precio ↓</option>
          </select>
          <button class="btn" id="closeOverlayProduct">Cerrar</button>
        </div>
      </div>
      <div class="lines-wrapper" style="height:calc(100% - 54px);">
        <div class="catalog-layout">
          <div class="catalog-filters">
            <div class="filter-group">
              <label>Marca (contiene)</label>
              <input id="prodBrandFilter" type="text" placeholder="ej: Kutz">
            </div>
            <div class="filter-group">
              <label>Precio</label>
              <div class="range-row">
                <input id="priceMin" type="number" min="0" placeholder="Mín">
                <input id="priceMax" type="number" min="0" placeholder="Máx">
              </div>
            </div>
            <div class="filter-group">
              <label>Categorías (aa_url → etiqueta = aa_name)</label>
              <div class="chips-wrap" id="facetBox"></div>
            </div>
            <div class="filter-group">
              <label>Resultados</label>
              <small style="color:#6c7a86;">Búsqueda + vendor + marca + rango + orden.</small>
            </div>
          </div>
          <div class="catalog-results" id="prodResults"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="../../js/menuConfig.js"></script>
  <script src="../../js/layout.js"></script>
  <script src="../../lib/supabaseConfig.js"></script>
  <script type="module" src="../../js/supabaseBrowserClient.js"></script>
  <script type="module" src="../../js/globalSupabase.js"></script>

  <script type="module">
    import * as catApi from '../../lib/cate_material.js';

    let blocksContainer, blocksEntregados, emptyState, emptyEntregados;
    let bodyPorEntregar, bodyEntregados, countPorEntregar, countEntregados, arrowPor, arrowEnt, togglePorEntregar, toggleEntregados;
    let overlay, overlayGrid, overlayTitle, closeOverlayBtn;
    let overlayLC, overlayLCGrid, overlayLCTitle, closeOverlayLC, addRowBtn;
    let overlayProduct, prodResults, prodSearchInput, prodVendorFilter, prodOrder, prodBrandFilter, priceMin, priceMax, closeOverlayProductBtn, facetBox;
    const TABLE = 'purchase_lines';
    let catEncargados = [], catUnidades = [], catModos = [], catEstadosPago = [], proveedores = [], materiales = [];
    let catMateriales = [];
    let catImagesMap = {};
    let currentRows = [];
    let currentBlockId = null;

    const projectPartsMap = new Map();
    const projectAllDoneMap = new Map();
    const projectFechaLimiteMap = new Map();

    // Estado de filtros de catálogo
    const prodState = { rowIdx: null, pageSize: 50, catIds: [] };
    const debounce = (fn, ms = 200) => { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; };

    window._getRows = () => currentRows;
    window._getBlockId = () => currentBlockId;

    // Helpers
    const escapeHtml = (str='') => str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    const fmtCLP = n => isNaN(n) ? '$0' : n.toLocaleString('es-CL',{style:'currency',currency:'CLP',maximumFractionDigits:0});
    const extractCatId = (url='') => {
      const m = (url || '').trim().match(/\/(\d+)(?:\/)?$/);
      return m ? m[1] : null;
    };

    function pickLast(sel) { const all = document.querySelectorAll(sel); return all.length ? all[all.length - 1] : null; }
    function ensureEls() {
      blocksContainer = pickLast('#blocksContainer');
      blocksEntregados = pickLast('#blocksEntregados');
      emptyState = pickLast('#emptyState');
      emptyEntregados = pickLast('#emptyEntregados');
      bodyPorEntregar = pickLast('#bodyPorEntregar');
      bodyEntregados = pickLast('#bodyEntregados');
      countPorEntregar = pickLast('#countPorEntregar');
      countEntregados = pickLast('#countEntregados');
      arrowPor = pickLast('#arrowPor');
      arrowEnt = pickLast('#arrowEnt');
      togglePorEntregar = pickLast('#togglePorEntregar');
      toggleEntregados = pickLast('#toggleEntregados');
      overlay = pickLast('#overlay');
      overlayGrid = pickLast('#overlayGrid');
      overlayTitle = pickLast('#overlayTitle');
      closeOverlayBtn = pickLast('#closeOverlay');
      overlayLC = pickLast('#overlayLC');
      overlayLCGrid = pickLast('#overlayLCGrid');
      overlayLCTitle = pickLast('#overlayLCTitle');
      closeOverlayLC = pickLast('#closeOverlayLC');
      addRowBtn = pickLast('#addRowBtn');

      overlayProduct = pickLast('#overlayProduct');
      prodResults = pickLast('#prodResults');
      prodSearchInput = pickLast('#prodSearchInput');
      prodVendorFilter = pickLast('#prodVendorFilter');
      prodOrder = pickLast('#prodOrder');
      prodBrandFilter = pickLast('#prodBrandFilter');
      priceMin = pickLast('#priceMin');
      priceMax = pickLast('#priceMax');
      facetBox = pickLast('#facetBox');
      closeOverlayProductBtn = pickLast('#closeOverlayProduct');

      if (closeOverlayBtn) closeOverlayBtn.onclick = () => { overlay.classList.remove('active'); document.body.classList.remove('overlay-open'); };
      if (closeOverlayLC) closeOverlayLC.onclick = () => { overlayLC.classList.remove('active'); document.body.classList.remove('overlay-open'); };
      if (addRowBtn) addRowBtn.onclick = addEmptyRow;

      if (togglePorEntregar) togglePorEntregar.onclick = () => toggleSection(bodyPorEntregar, arrowPor);
      if (toggleEntregados) toggleEntregados.onclick = () => toggleSection(bodyEntregados, arrowEnt);
      setSectionState(bodyPorEntregar, arrowPor, true);
      setSectionState(bodyEntregados, arrowEnt, false);

      if (closeOverlayProductBtn) closeOverlayProductBtn.onclick = closeProductOverlay;
      if (prodSearchInput) prodSearchInput.addEventListener('input', runSearch);
      if (prodVendorFilter) prodVendorFilter.addEventListener('change', runSearch);
      if (prodOrder) prodOrder.addEventListener('change', runSearch);
      if (prodBrandFilter) prodBrandFilter.addEventListener('input', runSearch);
      if (priceMin) priceMin.addEventListener('input', debounce(runSearch, 200));
      if (priceMax) priceMax.addEventListener('input', debounce(runSearch, 200));
    }

    function setSectionState(bodyEl, arrowEl, expanded) {
      if (!bodyEl) return;
      bodyEl.style.maxHeight = expanded ? bodyEl.scrollHeight + 40 + 'px' : '0';
      if (arrowEl) arrowEl.classList.toggle('up', !expanded);
    }
    function toggleSection(bodyEl, arrowEl) {
      if (!bodyEl) return;
      const isOpen = bodyEl.style.maxHeight && bodyEl.style.maxHeight !== '0px';
      setSectionState(bodyEl, arrowEl, !isOpen);
    }

    function getClient() { return window.supabase || window.globalSupabase?.client || window.supabaseClient?.client || null; }
    async function waitForClient(timeoutMs = 4000) {
      const start = performance.now();
      while (performance.now() - start < timeoutMs) {
        const c = getClient();
        if (c) return c;
        await new Promise(r => setTimeout(r, 50));
      }
      throw new Error('Supabase client no inicializado');
    }

    document.addEventListener('DOMContentLoaded', async () => {
      ensureEls();
      try {
        const client = await waitForClient();
        if (!window.supabase && client) window.supabase = client;
        await loadCatalogs();
        await loadSalesMeta();
        await loadBlocks();
        await loadCategoryImages();
        await runSearch(); // inicializa con resultados + facetas
      } catch (e) {
        console.error(e);
        window.utils?.mostrarNotificacion?.('Error al iniciar Compras', 'error');
      }
    });

    document.addEventListener('click', (e) => {
      const btnLC = e.target.closest('[data-block-lc]');
      const btnSummary = e.target.closest('[data-block-summary]');
      const delBtn = e.target.closest('[data-action="del-row"]');
      const dupBtn = e.target.closest('[data-action="dup-row"]');
      const searchBtn = e.target.closest('[data-action="search-prod"]');
      const pickBtn = e.target.closest('[data-action="pick-prod"]');
      const clearBtn = e.target.closest('[data-action="clear-prod"]');

      if (btnLC) { e.preventDefault(); openLC(btnLC.dataset.blockId, btnLC.dataset.blockTitle || ''); }
      if (btnSummary) { e.preventDefault(); openSummary(btnSummary.dataset.blockId, btnSummary.dataset.blockTitle || ''); }
      if (delBtn) { e.preventDefault(); const idx = Number(delBtn.dataset.row); deleteRow(idx); }
      if (dupBtn) { e.preventDefault(); const idx = Number(dupBtn.dataset.row); duplicateRow(idx); }
      if (searchBtn) { e.preventDefault(); openProductSearch(Number(searchBtn.dataset.row)); }
      if (pickBtn) { e.preventDefault(); handlePickProduct(pickBtn); }
      if (clearBtn) { e.preventDefault(); clearExternalProduct(Number(clearBtn.dataset.row)); }
    });

    // ---------- catálogos internos ----------
    async function loadCatalogs() {
      const client = await waitForClient();
      const [enc, uni, mod, est, cats] = await Promise.all([
        client.from('purchase_catalog_encargados').select('*').order('nombre'),
        client.from('purchase_catalog_unidades').select('*').order('nombre'),
        client.from('purchase_catalog_modos_compra').select('*').order('nombre'),
        client.from('purchase_catalog_estados_pago').select('*').order('nombre'),
        client.from('material_categories').select('name').order('name')
      ]);
      catEncargados = enc.data || [];
      catUnidades   = uni.data || [];
      catModos      = mod.data || [];
      catEstadosPago= est.data || [];
      catMateriales = (cats.data || []).map(c => c.name);

      const { data: provs } = await client.from('providers').select('id,name').order('name');
      proveedores = provs || [];
      const { data: mats } = await client.from('materials').select('id,name,category').order('name');
      materiales = mats || [];
    }

    async function loadSalesMeta() {
      const client = await waitForClient();

      const { data: ventasRows } = await client
        .from('ventas')
        .select('cotizacion_id, partida, partida_nombre, estado, fecha_entrega_limite');

      projectPartsMap.clear();
      projectAllDoneMap.clear();
      projectFechaLimiteMap.clear();

      (ventasRows || []).forEach(v => {
        const key = v.cotizacion_id;
        if (!key) return;
        const name = v.partida_nombre || v.partida || '';
        if (!projectPartsMap.has(key)) projectPartsMap.set(key, []);
        if (name) projectPartsMap.get(key).push(name);

        const st = (v.estado || '').toLowerCase();
        const done = st === 'completada';
        if (!projectAllDoneMap.has(key)) projectAllDoneMap.set(key, true);
        if (!done) projectAllDoneMap.set(key, false);

        if (v.fecha_entrega_limite && !projectFechaLimiteMap.has(key)) {
          projectFechaLimiteMap.set(key, v.fecha_entrega_limite);
        }
      });

      const { data: cotRows } = await client
        .from('cotizaciones')
        .select('id, fecha_entrega_limite')
        .eq('estado', 'aprobada');

      (cotRows || []).forEach(c => {
        if (c.id && c.fecha_entrega_limite && !projectFechaLimiteMap.has(c.id)) {
          projectFechaLimiteMap.set(c.id, c.fecha_entrega_limite);
        }
      });
    }

    function filterBlocks(blocks, approvedSet) {
      if (!approvedSet || approvedSet.size === 0) return blocks || [];
      return (blocks || []).filter(b => {
        if (b.deleted_at) return false;
        if (b.activa === false) return false;
        if (!b.proyecto_id) return false;
        return approvedSet.has(b.proyecto_id);
      });
    }

    async function fetchCobradoMap() {
      const client = await waitForClient();
      const { data } = await client.from('ventas').select('cotizacion_id,total_venta').not('cotizacion_id','is',null);
      const map = new Map();
      (data||[]).forEach(v => { if (v.cotizacion_id && v.total_venta != null) map.set(v.cotizacion_id, Number(v.total_venta)); });
      return map;
    }

    // ---------- bloques ----------
    async function loadBlocks() {
      try {
        const client = await waitForClient();
        const { data: cotAprob } = await client.from('cotizaciones').select('id').eq('estado','aprobada');
        const approved = new Set((cotAprob || []).map(c => c.id));

        const { data } = await client
          .from('purchase_blocks')
          .select('*')
          .order('created_at', { ascending: false });

        const cobradoMap = await fetchCobradoMap();

        const filtered = filterBlocks(data || [], approved);
        const toRender = filtered.length ? filtered : (data || []);
        const merged = toRender.map(b => ({
          ...b,
          total_cobrado: cobradoMap.has(b.proyecto_id) ? cobradoMap.get(b.proyecto_id) : (b.total_cobrado || 0)
        }));

        renderBlocks(merged);
      } catch (e) {
        console.error('Error cargando bloques de compras', e);
        window.utils?.mostrarNotificacion?.('Error cargando compras', 'error');
        renderBlocks([]);
      }
    }

    function renderBlocks(blocks) {
      ensureEls();
      if (!blocksContainer || !blocksEntregados || !emptyState || !emptyEntregados) return;

      const cards = blocks.map(b => {
        const parts = projectPartsMap.get(b.proyecto_id) || [];
        const partesLabel = parts.length ? parts.join(' · ') : 'Sin partidas';
        const fechaLim = projectFechaLimiteMap.get(b.proyecto_id) || b.fecha_entrega_limite || '';

        const avanceBase = (Number(b.total_comprado || 0) + Number(b.total_por_comprar || 0)) || 0;
        const pct = avanceBase > 0 ? Math.min(100, Math.round((Number(b.total_comprado || 0) / avanceBase) * 100)) : 0;
        const title = escapeHtml(b.proyecto_nombre || 'Proyecto');
        const diasRest = fechaLim ? Math.max(0, Math.ceil((new Date(fechaLim).getTime() - Date.now())/(1000*60*60*24))) : '—';

        return {
          isDone: projectAllDoneMap.get(b.proyecto_id) === true,
          html: `
            <div class="card">
              <div class="block-header">
                <div>
                  <h3 style="margin:0 0 4px;">${title}</h3>
                  <div class="meta">Partidas: ${escapeHtml(partesLabel)}</div>
                  <div class="meta" style="margin-top:6px;">Fecha de entrega límite: ${fechaLim ? escapeHtml(fechaLim) : '—'}</div>
                </div>
                <div style="display:flex; gap:6px;">
                  <button class="btn btn-ghost" data-block-lc data-block-id="${b.id}" data-block-title="${title}">Lista de compras</button>
                  <button class="btn btn-primary" data-block-summary data-block-id="${b.id}" data-block-title="${title}">Ver resumen</button>
                </div>
              </div>
              <div class="chips" style="margin:8px 0;">
                <span class="chip">Total cobrado: ${fmtCLP(b.total_cobrado)}</span>
                <span class="chip">Comprado: ${fmtCLP(b.total_comprado)}</span>
                <span class="chip">Por comprar: ${fmtCLP(b.total_por_comprar)}</span>
                <span class="chip">Avance: ${pct}%</span>
              </div>
              <div style="display:flex; gap:16px; flex-wrap:wrap; align-items:flex-start; margin-top:8px;">
                <div>
                  <div class="meta" style="font-weight:600;">Días restantes para fecha de entrega</div>
                  <div style="font-size:16px; font-weight:600;">${diasRest}</div>
                </div>
              </div>
            </div>
          `
        };
      });

      const porEntregarArr = cards.filter(c => !c.isDone);
      const entregadosArr  = cards.filter(c => c.isDone);

      countPorEntregar.textContent = porEntregarArr.length;
      countEntregados.textContent = entregadosArr.length;

      const porEntregar = porEntregarArr.map(c => c.html).join('');
      const entregados  = entregadosArr.map(c => c.html).join('');

      if (!porEntregar) { emptyState.style.display = 'block'; blocksContainer.innerHTML = ''; }
      else { emptyState.style.display = 'none'; blocksContainer.innerHTML = porEntregar; }

      if (!entregados) { emptyEntregados.style.display = 'block'; blocksEntregados.innerHTML = ''; }
      else { emptyEntregados.style.display = 'none'; blocksEntregados.innerHTML = entregados; }

      if (bodyPorEntregar) setSectionState(bodyPorEntregar, arrowPor, true);
      if (bodyEntregados) setSectionState(bodyEntregados, arrowEnt, bodyEntregados.style.maxHeight !== '0px');
    }

    // ---------- util options ----------
    function makeOptions(list, valKey = 'nombre', labelKey = 'nombre') {
      return ['<option value="">--</option>', ...list.map(o => `<option value="${escapeHtml(o[valKey])}">${escapeHtml(o[labelKey])}</option>`)].join('');
    }
    function productOptions(category) {
      const list = materiales.filter(m => !category || m.category === category);
      return makeOptions(list, 'id', 'name');
    }
    function rebuildProductOptions(rowIdx) {
      const row = currentRows[rowIdx] || {};
      const sel = overlayLCGrid?.querySelector?.(`select[data-row="${rowIdx}"][data-f="producto_id"]`);
      if (!sel) return;
      sel.innerHTML = productOptions(row.categoria || '');
      if (row.producto_id) {
        const valid = materiales.find(m => m.id === row.producto_id && (!row.categoria || m.category === row.categoria));
        sel.value = valid ? row.producto_id : '';
        if (!valid) currentRows[rowIdx].producto_id = null;
      } else sel.value = '';
    }

    // ---------- filas ----------
    function setVal(idx, field, value) {
      const el = overlayLCGrid?.querySelector?.(`[data-row="${idx}"][data-f="${field}"]`);
      if (el) el.value = value ?? '';
    }
    function isMeaningful(payload) {
      return (
        (payload.producto_id && payload.producto_id !== '') ||
        (payload.aa_product_id && payload.aa_product_id !== '') ||
        (payload.categoria && payload.categoria !== '') ||
        (payload.cantidad && Number(payload.cantidad) > 0) ||
        (payload.precio_unit && Number(payload.precio_unit) > 0) ||
        (payload.observaciones && payload.observaciones.trim() !== '')
      );
    }
    function addEmptyRow() { if (!currentBlockId) return; currentRows.push({ id: null, block_id: currentBlockId, placeholder: true, _saving: false }); renderGrid(currentRows); }
    async function cleanupEmptiesInDB(lines, client) {
      const empties = (lines || []).filter(r => !isMeaningful(r) && r.id);
      if (!empties.length) return;
      const ids = empties.map(r => r.id);
      try { await client.from(TABLE).delete().in('id', ids); }
      catch (e) { console.error('cleanupEmptiesInDB', e); }
    }
    async function loadLines(blockId) {
      const client = await waitForClient();
      const { data, error } = await client
        .from(TABLE)
        .select('id,block_id,encargado,proveedor_id,direccion,categoria,producto_id,aa_product_id,aa_vendor,unidad,cantidad,precio_unit,total,modo_compra,estado_pago,observaciones,created_at')
        .eq('block_id', blockId)
        .order('created_at', { ascending: true });
      if (error) { console.error('loadLines', error); currentRows = []; }
      else { await cleanupEmptiesInDB(data, client); currentRows = (data || []).filter(r => isMeaningful(r)); await hydrateAaNames(); }
      renderGrid(currentRows);
    }

    async function hydrateAaNames() {
      const ids = [...new Set(currentRows.map(r => r.aa_product_id).filter(Boolean))];
      if (!ids.length) return;
      const client = await waitForClient();
      const { data, error } = await client
        .from('aa_products')
        .select('aa_product_id:id, aa_name, aa_price, aa_url, aa_subcategory, aa_section, vendor')
        .in('aa_product_id', ids);
      if (error) return;
      const map = new Map((data || []).map(r => [r.id, r]));
      currentRows = currentRows.map(r => {
        const ref = r.aa_product_id ? map.get(r.aa_product_id) : null;
        return {
          ...r,
          _aa_name: ref ? ref.aa_name : (r._aa_name || ''),
          aa_vendor: ref ? (ref.vendor || r.aa_vendor) : r.aa_vendor,
          aa_price: ref ? ref.aa_price : r.aa_price,
          _aa_category: ref ? extractCatId(ref.aa_url) : r._aa_category
        };
      });
    }

    async function recomputeBlockTotals(blockId) {
      if (!blockId) return;
      const client = await waitForClient();
      const { data, error } = await client
        .from(TABLE)
        .select('cantidad,precio_unit,estado_pago')
        .eq('block_id', blockId);
      if (error) { console.error('totals', error); return; }
      let totalSum = 0, comprado = 0;
      (data || []).forEach(l => {
        const lineTotal = Number(l.cantidad || 0) * Number(l.precio_unit || 0);
        totalSum += lineTotal;
        const st = (l.estado_pago || '').toLowerCase();
        if (st.includes('comprado') || st.includes('stock')) comprado += lineTotal;
      });
      const porComprar = Math.max(0, totalSum - comprado);
      try {
        await client.from('purchase_blocks').update({
          total_comprado: comprado,
          total_por_comprar: porComprar
        }).eq('id', blockId);
        await loadBlocks();
      } catch (e) { console.error('update block totals', e); }
    }

    // ---------- render tabla ----------
    function renderGrid(rows) {
      if (overlayLCGrid && overlayLCGrid._listenersSet) {
        overlayLCGrid.replaceWith(overlayLCGrid.cloneNode(true));
        overlayLCGrid = document.getElementById('overlayLCGrid');
      }
      const headers = ['', 'Encargado', 'Proveedor', 'Dirección', 'Categoría', 'Producto', 'Obs', 'Unidad', 'Cantidad', 'Precio Unit', 'Total', 'Modo', 'Estado pago'];
      const thead = `<thead><tr>${headers.map((h,idx)=>idx===0?`<th style="width:90px;">${h}</th>`:`<th>${escapeHtml(h)}</th>`).join('')}</tr></thead>`;
      const categoriaOptions = makeOptions(catMateriales.map(c => ({ nombre: c })));
      const bodyRows = rows.map((row, idx) => {
        const idAttr = row.id ? `data-id="${row.id}"` : '';
        return `<tr data-row="${idx}" ${idAttr}>
            <td class="action-cell">
              <button class="icon-btn danger" type="button" title="Eliminar" data-action="del-row" data-row="${idx}">
                <svg viewBox="0 0 24 24"><path d="M9 11v6M15 11v6M5.5 7h13"/><path d="M10 5.5h4l.7 1.7H9.3l.7-1.7Z"/><rect x="6.5" y="9" width="11" height="10" rx="1.4"/></svg>
              </button>
              <button class="icon-btn primary" type="button" title="Duplicar" data-action="dup-row" data-row="${idx}">
                <svg viewBox="0 0 24 24"><rect x="8" y="6" width="11" height="13" rx="2"/><path d="M6 16V8a2 2 0 0 1 2-2h7"/></svg>
              </button>
            </td>
            <td><select data-f="encargado" data-row="${idx}">${makeOptions(catEncargados)}</select></td>
            <td><select data-f="proveedor_id" data-row="${idx}">${makeOptions(proveedores,'id','name')}</select></td>
            <td><input data-f="direccion" data-row="${idx}" type="text" value="${escapeHtml(row.direccion||'')}"></td>
            <td><select data-f="categoria" data-row="${idx}">${categoriaOptions}</select></td>
            <td>
              <div class="prod-cell ${row.aa_product_id ? 'hidden' : ''}">
                <select class="prod-select" data-f="producto_id" data-row="${idx}"></select>
                <button class="btn-search" type="button" title="Buscar en catálogo" data-action="search-prod" data-row="${idx}">🔍</button>
              </div>
              <div class="prod-pill ${row.aa_product_id ? '' : 'hidden'}" data-row="${idx}" data-role="aa-pill">
                <span><strong data-role="aa-name"></strong></span>
                <span data-role="aa-vendor" style="color:#6c7a86;"></span>
                <button class="btn-clear-prod" data-action="clear-prod" data-row="${idx}" title="Quitar">✕</button>
              </div>
              <input class="prod-label ${row.aa_product_id ? '' : 'hidden'}" data-f="aa_product_name" data-row="${idx}" type="text" value="${escapeHtml(row._aa_name || '')}" readonly>
            </td>
            <td><input data-f="observaciones" data-row="${idx}" type="text" value="${escapeHtml(row.observaciones||'')}"></td>
            <td><select data-f="unidad" data-row="${idx}">${makeOptions(catUnidades)}</select></td>
            <td><input data-f="cantidad" data-row="${idx}" type="number" step="0.01" value="${row.cantidad||''}"></td>
            <td><input data-f="precio_unit" data-row="${idx}" type="number" step="0.01" value="${row.precio_unit||''}"></td>
            <td class="readonly-cell"><input data-f="total" data-row="${idx}" type="number" step="0.01" value="${row.total||''}" readonly></td>
            <td><select data-f="modo_compra" data-row="${idx}">${makeOptions(catModos)}</select></td>
            <td><select data-f="estado_pago" data-row="${idx}">${makeOptions(catEstadosPago)}</select></td>
          </tr>`;
      }).join('');
      overlayLCGrid.innerHTML = `<div class="table-wrapper"><table class="lc-table">${thead}<tbody>${bodyRows}</tbody></table></div>`;
      rows.forEach((row, idx) => {
        setVal(idx, 'encargado', row.encargado);
        setVal(idx, 'proveedor_id', row.proveedor_id);
        setVal(idx, 'categoria', row.categoria);
        rebuildProductOptions(idx);
        setVal(idx, 'producto_id', row.producto_id);
        setVal(idx, 'observaciones', row.observaciones);
        setVal(idx, 'unidad', row.unidad);
        setVal(idx, 'modo_compra', row.modo_compra);
        setVal(idx, 'estado_pago', row.estado_pago);
      });
      const tbl = overlayLCGrid.querySelector('table.lc-table');
      if (tbl) { tbl.addEventListener('change', onCellEdit, false); tbl.addEventListener('input', onCellEdit, false); }
      overlayLCGrid._listenersSet = true;
    }

    // ---------- acciones tabla ----------
    async function onCellEdit(e) {
      const field = e.target.getAttribute('data-f');
      const rowIdx = Number(e.target.getAttribute('data-row'));
      if (Number.isNaN(rowIdx) || !field) return;
      const row = currentRows[rowIdx] || {};
      let val = e.target.value;
      if (field === 'cantidad' || field === 'precio_unit') val = Number(val || 0);
      currentRows[rowIdx] = { ...row, [field]: val, block_id: row.block_id || currentBlockId, placeholder: false };
      if (field === 'categoria') { currentRows[rowIdx].producto_id = null; rebuildProductOptions(rowIdx); }
      currentRows[rowIdx].total = Number(currentRows[rowIdx].cantidad || 0) * Number(currentRows[rowIdx].precio_unit || 0);
      await persistRow(rowIdx);
      await recomputeBlockTotals(currentBlockId);
    }

    async function persistRow(idx) {
      const row = currentRows[idx]; if (!row) return; if (row._saving) return;
      const client = await waitForClient();
      const payload = {
        block_id: row.block_id || currentBlockId,
        encargado: row.encargado || null,
        proveedor_id: row.proveedor_id || null,
        direccion: row.direccion || null,
        categoria: row.categoria || null,
        producto_id: row.producto_id || null,
        aa_product_id: row.aa_product_id || null,
        aa_vendor: row.aa_vendor || null,
        unidad: row.unidad || null,
        cantidad: row.cantidad || null,
        precio_unit: row.precio_unit || null,
        modo_compra: row.modo_compra || null,
        estado_pago: row.estado_pago || null,
        observaciones: row.observaciones || null
      };
      const meaningful = isMeaningful(payload);
      if (!row.id && !meaningful) return;
      currentRows[idx] = { ...row, _saving: true };
      try {
        if (!row.id) {
          const { data, error } = await client.from(TABLE).insert([payload]).select().single();
          if (error) throw error;
          currentRows[idx] = { ...row, ...data, placeholder: false, _saving: false };
        } else {
          const { data, error } = await client.from(TABLE).update(payload).eq('id', row.id).select().maybeSingle();
          if (error) throw error;
          if (data) currentRows[idx] = { ...row, ...data, placeholder: false, _saving: false };
        }
      } catch (e) { console.error('Persist error', e); }
      finally { if (currentRows[idx]) currentRows[idx]._saving = false; }
    }

    async function deleteRow(idx) { const row = currentRows[idx]; if (!row) return; const client = await waitForClient(); try { if (row.id) await client.from(TABLE).delete().eq('id', row.id); currentRows.splice(idx, 1); renderGrid(currentRows); await recomputeBlockTotals(currentBlockId); } catch (e) { console.error('Delete error', e); } }
    function duplicateRow(idx) { const src = currentRows[idx]; if (!src) return; const clone = { ...src, id: null, block_id: currentBlockId, created_at: null, placeholder: false, _saving: false }; currentRows.splice(idx + 1, 0, clone); renderGrid(currentRows); if (isMeaningful(clone)) persistRow(idx + 1).then(() => recomputeBlockTotals(currentBlockId)); }
    function clearExternalProduct(idx) {
      const row = currentRows[idx]; if (!row) return;
      currentRows[idx] = { ...row, aa_product_id: null, aa_vendor: null, _aa_name: '', producto_id: row.producto_id || null };
      renderGrid(currentRows);
    }

    // ---------- overlay resumen ----------
    async function loadCategoryImages() { try { const { data } = await catApi.listCategoriesWithImages(); catImagesMap = (data || []).reduce((a,c)=>{a[c.name]=c.image_url;return a;},{}); } catch (e) { console.warn('cat images', e); } }
    function pickCategoryImage(cat) { return catImagesMap[cat] || 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120"><rect width="120" height="120" fill="%23e5e7eb"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="%239ca3af" font-size="16">LC</text></svg>'; }
    async function fetchLines(blockId) {
      const client = await waitForClient();
      const { data, error } = await client
        .from(TABLE)
        .select('id,categoria,total')
        .eq('block_id', blockId)
        .neq('categoria','Sin categoría')
        .order('created_at',{ascending:true});
      if (error) throw error; return data || [];
    }
    function renderSummary(lines) {
      if (!lines.length) { overlayGrid.innerHTML = '<div style="padding:12px; text-align:center; color:#6c7a86;">Sin líneas</div>'; return; }
      const byCat = {};
      for (const l of lines) {
        const k = l.categoria || 'Sin categoría';
        if (k === 'Sin categoría') continue;
        byCat[k] = byCat[k] || { total:0, count:0 };
        byCat[k].total += Number(l.total || 0);
        byCat[k].count += 1;
      }
      const cards = Object.entries(byCat).map(([cat, info]) => `
        <div class="item-card">
          <img class="item-thumb" src="${escapeHtml(pickCategoryImage(cat))}" alt="">
          <div class="item-body">
            <h4>${escapeHtml(cat)}</h4>
            <div class="muted">Items: ${info.count}</div>
            <div><strong>${fmtCLP(info.total)}</strong></div>
          </div>
        </div>`).join('');
      overlayGrid.innerHTML = `<div class="item-grid">${cards}</div>`;
    }
    async function openSummary(blockId, title) {
      ensureEls();
      if (!overlay || !overlayGrid || !overlayTitle) return;
      overlayTitle.textContent = 'Ver resumen - ' + (title || blockId);
      overlay.classList.add('active'); document.body.classList.add('overlay-open');
      try { await loadCategoryImages(); const lines = await fetchLines(blockId); renderSummary(lines); }
      catch (e) { console.error(e); overlayGrid.innerHTML = '<div style="padding:12px; color:#c00;">Error cargando resumen</div>'; }
    }

    // ---------- overlay LC ----------
    async function openLC(blockId, title) {
      ensureEls();
      currentBlockId = blockId;
      const wrapper = overlayLC?.querySelector?.('.overlay-content');
      if (wrapper) wrapper.dataset.currentBlock = blockId;
      currentRows = [];
      if (overlayLCGrid) overlayLCGrid.innerHTML = '';
      if (overlayLC && overlayLCGrid && overlayLCTitle) {
        overlayLCTitle.textContent = 'Lista de compras - ' + (title || blockId);
        overlayLC.classList.add('active'); document.body.classList.add('overlay-open');
      }
      try { await loadLines(blockId); }
      catch (e) { console.error(e); overlayLCGrid.innerHTML = '<div style="padding:12px; color:#c00;">Error cargando líneas</div>'; }
    }
    function closeProductOverlay() { if (!overlayProduct) return; overlayProduct.classList.remove('active'); document.body.classList.remove('overlay-open'); }

    // ---------- Búsqueda catálogo externo ----------
    const runSearch = debounce(async () => {
      if (!prodResults) return;
      const query = (prodSearchInput?.value || '').trim();
      const vendor = prodVendorFilter?.value || '';
      const brand = (prodBrandFilter?.value || '').trim();
      const minP = priceMin?.value ? Number(priceMin.value) : null;
      const maxP = priceMax?.value ? Number(priceMax.value) : null;
      const order = prodOrder?.value || 'name-asc';
      try {
        const rows = await searchProducts({ query, vendor, brand, minP, maxP, order, page:0 });
        renderProdResults(rows);
        renderFacetBox(rows);
      } catch (e) {
        prodResults.innerHTML = '<div style="padding:12px;color:#c00;">Error buscando</div>';
        if (facetBox) facetBox.innerHTML = '';
        console.error(e);
      }
    }, 200);

    async function searchProducts({ query='', vendor='', brand='', minP=null, maxP=null, order='name-asc', page=0 }) {
      const client = await waitForClient();
      let q = client.from('aa_products')
        .select('aa_product_id:id, aa_name, aa_price, aa_url, aa_brand, vendor')
        .ilike('aa_name', `%${query}%`)
        .range(page * prodState.pageSize, page * prodState.pageSize + prodState.pageSize - 1);

      if (vendor) q = q.eq('vendor', vendor);
      if (brand) q = q.ilike('aa_brand', `%${brand}%`);
      if (minP !== null && !Number.isNaN(minP)) q = q.gte('aa_price', minP);
      if (maxP !== null && !Number.isNaN(maxP)) q = q.lte('aa_price', maxP);

      if (order === 'price-asc') q = q.order('aa_price', { ascending:true, nullsFirst:true });
      else if (order === 'price-desc') q = q.order('aa_price', { ascending:false, nullsLast:true });
      else q = q.order('aa_name', { ascending:true });

      const { data, error } = await q;
      if (error) throw error;

      // Enriquecer con catId (último tramo numérico de aa_url)
      const enriched = (data || []).map(r => ({
        ...r,
        _catId: extractCatId(r.aa_url || ''),
      }));

      // Filtro cliente por categorías seleccionadas
      const filtered = prodState.catIds.length
        ? enriched.filter(r => prodState.catIds.includes(r._catId))
        : enriched;

      return filtered;
    }

    function renderProdResults(rows) {
      if (!prodResults) return;
      if (!rows.length) { prodResults.innerHTML = '<div style="padding:12px;color:#666;">Sin resultados</div>'; return; }
      const html = rows.map(r => `
        <div style="display:flex;gap:8px;align-items:center;border-bottom:1px solid #e5e7eb;padding:8px;">
          <div style="flex:1;">
            <div style="font-weight:700;">${escapeHtml(r.aa_name)}</div>
            <div style="font-size:12px;color:#6c7a86;">${escapeHtml(r.vendor || '')}${r.aa_brand ? ' · ' + escapeHtml(r.aa_brand) : ''}</div>
            <div style="font-size:12px;color:#6c7a86;">Cat ID: ${escapeHtml(r._catId || '—')}</div>
            <div style="font-size:12px;color:#6c7a86;">${escapeHtml(r.aa_url || '')}</div>
          </div>
          <div style="width:110px;font-weight:600;">${r.aa_price ? fmtCLP(r.aa_price) : '—'}</div>
          <div style="display:flex;gap:6px;">
            <a href="${escapeHtml(r.aa_url || '#')}" target="_blank" class="btn btn-ghost" style="height:28px;">Ver</a>
            <button class="btn btn-primary" style="height:28px;" data-action="pick-prod"
              data-id="${r.aa_product_id}"
              data-vendor="${escapeHtml(r.vendor || '')}"
              data-name="${escapeHtml(r.aa_name)}"
              data-price="${r.aa_price || ''}"
              data-cat="${escapeHtml(r._catId || '')}"
            >Usar</button>
          </div>
        </div>`).join('');
      prodResults.innerHTML = html;
    }

    function renderFacetBox(rows) {
      if (!facetBox) return;
      const counts = new Map();
      rows.forEach(r => {
        const id = r._catId;
        if (!id) return;
        if (!counts.has(id)) counts.set(id, { count:0, label: r.aa_name });
        counts.get(id).count += 1;
      });
      const facets = Array.from(counts.entries()).sort((a,b)=>a[0].localeCompare(b[0]));
      const html = facets.map(([id, info]) => {
        const checked = prodState.catIds.includes(id) ? 'checked' : '';
        return `<label class="chip-check">
          <input type="checkbox" data-facet="${id}" ${checked}>
          <span>${escapeHtml(info.label || id)}</span>
          <small style="color:#6c7a86;">(${info.count})</small>
        </label>`;
      }).join('');
      facetBox.innerHTML = html || '<div style="color:#6c7a86;">Sin categorías</div>';
      facetBox.querySelectorAll('input[type=checkbox]').forEach(cb => {
        cb.onchange = () => {
          const val = cb.getAttribute('data-facet');
          if (cb.checked) {
            if (!prodState.catIds.includes(val)) prodState.catIds.push(val);
          } else {
            prodState.catIds = prodState.catIds.filter(x => x !== val);
          }
          runSearch();
        };
      });
    }

    function openProductSearch(rowIdx) {
      prodState.rowIdx = rowIdx;
      overlayProduct?.classList.add('active');
      document.body.classList.add('overlay-open');
      runSearch();
    }

    async function handlePickProduct(btn) {
      const rowIdx = prodState.rowIdx;
      if (rowIdx == null) return;
      const id = btn.dataset.id || null;
      const vendor = btn.dataset.vendor || null;
      const name = btn.dataset.name || '';
      const price = Number(btn.dataset.price || 0);
      const catId = btn.dataset.cat || null;

      currentRows[rowIdx] = {
        ...currentRows[rowIdx],
        aa_product_id: id,
        aa_vendor: vendor,
        _aa_name: name,
        aa_price: price,
        producto_id: null // ocultar combo interno
      };
      renderGrid(currentRows);
      await persistRow(rowIdx);
      await recomputeBlockTotals(currentBlockId);
      closeProductOverlay();
    }

    window.utils = window.utils || {};
  </script>
</body>
</html>
