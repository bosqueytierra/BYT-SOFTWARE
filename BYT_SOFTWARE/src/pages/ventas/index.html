<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ventas - BYT SOFTWARE</title>
  <link rel="stylesheet" href="../../styles/global.css">
  <!-- flatpickr para 2 meses -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <style>
    :root {
      --bg:#f6f7f8; --card:#fff; --border:#e4e7eb; --text:#2d2d2d; --muted:#6c7a86;
      --primary:#2e5e4e; --primary-soft:#3f705d; --danger:#c0392b; --shadow:0 6px 16px rgba(0,0,0,0.06);
      --selected:#e9f2ed; --dot-ok:#1f9d55; --dot-bad:#d64545;
      --st-aprobada:#e3f2fd; --st-en_ejecucion:#f6e0a3; --st-completada:#d6f5d6; --st-postventa:#f8d0d0;
      --chip-green:#e9f7ef; --chip-red:#fdeceb; --chip-green-text:#1f9d55; --chip-red-text:#d64545;
      --chip-neutral:#f2f3f5; --chip-neutral-text:#6c7a86;
    }
    body{margin:0;font-family:"Inter","SF Pro Display","Roboto",system-ui,sans-serif;background:var(--bg);color:var(--text);}
    .page{max-width:1800px;width:99%;margin:22px auto 48px;padding:0 28px;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;box-shadow:var(--shadow);}
    .card + .card{margin-top:14px;}
    .header-card{display:flex;justify-content:space-between;gap:12px;align-items:center;}
    .filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;align-items:end;}
    label{font-size:13px;color:var(--muted);font-weight:600;margin-bottom:6px;display:block;}
    input,select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:#fdfdfd;font-family:inherit;font-size:14px;color:var(--text);}
    table{width:100%;border-collapse:collapse;}
    th,td{padding:10px 12px;border-bottom:1px solid var(--border);text-align:left;font-size:14px;}
    th{color:var(--muted);font-weight:700;background:#fafafa;}
    tr.project-row{cursor:pointer;transition:background .15s ease;}
    tr.project-row:hover{background:#f5f8f7;}
    tr.project-row.selected{background:var(--selected);}
    .actions{display:flex;gap:6px;flex-wrap:wrap;}
    .btn{border:1px solid var(--border);background:#fff;color:#1f2430;padding:9px 12px;border-radius:10px;cursor:pointer;font-weight:700;font-size:13px;display:inline-flex;align-items:center;gap:6px;}
    .btn-ghost{background:#f0f3f5;color:#1f2430;}
    .empty{padding:14px;color:var(--muted);text-align:center;}
    .state-icon{font-size:20px;display:inline-block;margin-right:6px;}
    .money{font-weight:700;color:#2e5e4e;}
    .table-title{margin:0 0 8px;font-size:16px;font-weight:800;}
    .subtext{color:var(--muted);font-size:13px;margin:0 0 8px;}
    .note-indicator{font-size:12px;color:var(--muted);display:inline-block;margin-left:6px;}
    select.state-select{min-width:150px;background:#fff;}
    .state-select.st-aprobada{background:var(--st-aprobada);}
    .state-select.st-en_ejecucion{background:var(--st-en_ejecucion);}
    .state-select.st-completada{background:var(--st-completada);}
    .state-select.st-postventa{background:var(--st-postventa);}
    .state-select.st-cancelada{background:#fff;}
    select.state-select option{background:#fff;color:#2d2d2d;}
    .dot-status{width:14px;height:14px;border-radius:50%;display:inline-block;}
    .dot-ok{background:var(--dot-ok);}
    .dot-bad{background:var(--dot-bad);}
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.35);display:none;align-items:center;justify-content:center;z-index:12000;padding:16px;}
    .modal{background:#fff;border-radius:14px;border:1px solid var(--border);box-shadow:0 16px 40px rgba(0,0,0,0.12);width:min(520px,100%);padding:18px;}
    .modal h3{margin:0 0 8px;}
    .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:12px;flex-wrap:wrap;}
    textarea{width:100%;min-height:140px;padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-family:inherit;font-size:14px;background:#fdfdfd;}
    .diff-chip{display:inline-flex;align-items:center;gap:8px;padding:8px 10px;border-radius:12px;font-weight:700;}
    .diff-pos{background:var(--chip-green);color:var(--chip-green-text);}
    .diff-neg{background:var(--chip-red);color:var(--chip-red-text);}
    .diff-neutral{background:var(--chip-neutral);color:var(--chip-neutral-text);}
    .diff-sign{font-size:18px;font-weight:800;}
    .resumen-row{display:flex;justify-content:space-between;align-items:center;margin:4px 0;}
    .resumen-label{color:var(--muted);font-size:13px;}
    .resumen-value{font-weight:700;}
    .resumen-divider{border:none;border-top:1px solid var(--border);margin:8px 0;}

    /* ---------- ACCORDION (SaaS style) ---------- */
    .projects-list{display:flex;flex-direction:column;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:#fff;}
    .projects-header,
    .project-row-grid{
      display:grid;
      grid-template-columns: 36px minmax(180px,1.6fr) 1fr 1fr 1fr 1fr 170px;
      gap:12px;
      align-items:center;
      padding:12px 14px;
    }
    .projects-header{
      font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em;
      background:#fafafa;border-bottom:1px solid var(--border);
    }
    .project-block{border-bottom:1px solid var(--border);}
    .project-block:last-child{border-bottom:none;}
    .project-row{
      cursor:pointer;
      transition:background .2s ease, border-left-color .2s ease;
      border-left:3px solid transparent;
      background:#fff;
    }
    .project-row:hover{background:#f5f8f7;}
    .project-row.open{
      background:#f0f6f3;
      border-left-color:var(--primary);
    }
    .project-row .pcell{font-size:14px;color:var(--text);min-width:0;overflow:hidden;text-overflow:ellipsis;}
    .project-row .pcell.name{font-weight:700;}
    .project-row input[type="text"]{padding:8px 10px;font-size:13px;}

    .project-details-row{
      max-height:0;
      opacity:0;
      overflow:hidden;
      transform:translateY(-8px);
      transition:
        max-height .35s ease,
        opacity .25s ease,
        transform .25s ease;
      background:#fafafa;
      border-top:1px solid transparent;
    }
    .project-details-row.open{
      max-height:1600px;
      opacity:1;
      transform:translateY(0);
      border-top-color:var(--border);
      box-shadow:inset 0 1px 0 rgba(0,0,0,0.02);
    }
    .project-details-inner{
      display:grid;
      grid-template-columns:2fr 1fr;
      gap:16px;
      padding:18px 20px;
    }
    .project-details-inner .panel{
      background:#fff;
      border:1px solid var(--border);
      border-radius:12px;
      padding:12px 14px;
      box-shadow:0 2px 8px rgba(0,0,0,0.04);
    }
    .project-details-inner .panel h4{margin:0 0 10px;font-size:13px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
    .partidas-table{width:100%;border-collapse:collapse;}
    .partidas-table th,.partidas-table td{padding:8px 10px;border-bottom:1px solid var(--border);font-size:14px;text-align:left;}
    .partidas-table tr:last-child td{border-bottom:none;}

    @media (max-width:1100px){
      .projects-header,.project-row-grid{grid-template-columns:36px minmax(140px,1.4fr) 1fr 1fr 1fr 1fr;}
      .projects-header .pcell.actions,.project-row .pcell.actions{display:none;}
    }
    @media (max-width:900px){
      .project-details-inner{grid-template-columns:1fr;}
    }
    @media (max-width:760px){
      .projects-header{display:none;}
      .project-row-grid{grid-template-columns:24px 1fr;gap:8px;}
      .project-row .pcell:not(.dot):not(.name){display:none;}
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card header-card">
      <div>
        <h2 style="margin:0;">Ventas</h2>
        <p style="margin:2px 0 0;color:var(--muted);font-size:13px;">Cotizaciones aprobadas. Selecciona un proyecto para ver sus partidas.</p>
      </div>
      <div class="actions">
        <button class="btn btn-ghost" type="button" onclick="cargarVentas()">Recargar</button>
        <a class="btn btn-ghost" href="dashboard.html">Ir a Dashboard</a>
      </div>
    </div>

    <div class="card">
      <h3 style="margin:0 0 10px;">Filtros</h3>
      <div class="filters">
        <div>
          <label>Buscar por proyecto o partida</label>
          <input id="filtro-texto" type="text" placeholder="Proyecto o partida..." oninput="aplicarFiltros()">
        </div>
        <div>
          <label>Estado</label>
          <select id="filtro-estado" onchange="aplicarFiltros()">
            <option value="todos" selected>Todos</option>
            <option value="aprobada">Aprobada (cotización)</option>
            <option value="en_ejecucion">En ejecución</option>
            <option value="completada">Completada</option>
            <option value="cancelada">Cancelada</option>
            <option value="postventa">Postventa</option>
          </select>
        </div>
      </div>
    </div>

    <div class="card">
      <h3 style="margin:0 0 10px;">Proyectos</h3>
      <p class="subtext">Haz clic en un proyecto para desplegar sus partidas y resumen.</p>
      <div id="proyectos-wrapper"></div>
    </div>
  </div>

  <!-- Modal notas -->
  <div class="modal-backdrop" id="notes-modal">
    <div class="modal">
      <h3 id="notes-title">Observaciones</h3>
      <textarea id="notes-textarea" placeholder="Escribe observaciones..."></textarea>
      <div class="modal-actions">
        <button class="btn btn-ghost" type="button" onclick="closeNotesModal()">Cancelar</button>
        <button class="btn btn-primary" type="button" onclick="saveNotes()">Guardar</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>

  <script src="../../js/menuConfig.js"></script>
  <script src="../../js/layout.js"></script>
  <script src="../../lib/supabaseConfig.js"></script>
  <script type="module" src="../../js/supabaseBrowserClient.js"></script>
  <script type="module" src="../../js/globalSupabase.js"></script>

  <script>
    const MOTIVOS_BAJADA = [
      'Ajuste a presupuesto del cliente','Descuento comercial aplicado','Ajuste tributario (IVA u otros impuestos)',
      'Variación en costos reales de compra','Modificación de cantidades ejecutadas','Sustitución de materiales o proveedores',
      'Error en cotización inicial','Reajuste por plazos de entrega','Eliminación de partidas no ejecutadas',
      'Ajuste por logística o transporte','Regularización administrativa'
    ];
    const MOTIVOS_SUBIDA = [
      'Aumento en costo de materiales','Aumento en costo de mano de obra','Incorporación de trabajos adicionales',
      'Cambio en especificaciones del proyecto','Aumento por proveedor o marca seleccionada','Ajuste por variación del tipo de cambio',
      'Incremento por urgencia en plazos','Costos adicionales de transporte o logística','Ajuste por condiciones del lugar de instalación',
      'Reproceso o rectificación solicitada por el cliente','Diferencia entre mediciones estimadas y reales',
      'Actualización de precios por vigencia de cotización','Ajuste por normativa o requerimientos técnicos',
      'Aumento por disponibilidad de materiales','Ajuste por condiciones de pago'
    ];
    const ESTADOS = ['aprobada','en_ejecucion','completada','cancelada','postventa'];

    let ventasData = [];
    let ventasFiltradas = [];
    let proyectos = [];
    let selectedProyectoKey = null;
    const notesStore = new Map();
    let notesModalState = { partidaId: null, proyectoKey: null, proyectoNombre: '' };
    const proyectoCobradoMap = new Map();
    const motivoVariacionMap = new Map();
    const proyectoFechaEntregaMap = new Map();
    let approvedCotIds = new Set();
    let fpInstances = [];

    async function waitForSupabaseClient(maxMs=15000){
      const start=Date.now();
      while(Date.now()-start<maxMs){
        if(window.supabaseClient && typeof window.supabaseClient.listarVentas==='function') return window.supabaseClient;
        await new Promise(r=>setTimeout(r,300));
      }
      throw new Error('supabaseClient no disponible tras esperar');
    }
    async function waitForSupabase(maxMs=15000){
      const start=Date.now();
      while(Date.now()-start<maxMs){
        if(window.supabase && typeof window.supabase.from==='function') return window.supabase;
        await new Promise(r=>setTimeout(r,300));
      }
      throw new Error('window.supabase no disponible tras esperar');
    }

    function normalizeEstado(v){ return (v.estado || '').trim(); }
    function fmt(num){ if(num==null) return '$0'; return new Intl.NumberFormat('es-CL',{style:'currency',currency:'CLP',maximumFractionDigits:0}).format(num); }
    function parseMoney(val){
      if(typeof val==='number') return val;
      const cleaned=String(val||'').replace(/[^0-9,-.]/g,'');
      const noThousand=cleaned.replace(/[.,](?=.*[0-9]{3}\b)/g,'');
      const n=Number(noThousand.replace(',','.'));
      return Number.isFinite(n)?Math.round(n):0;
    }
    function formatCliente(cli){
      if(!cli) return '';
      if(typeof cli==='string'){
        try{const o=JSON.parse(cli);return o.nombre||o.name||o.cliente||'';}catch{return cli;}
      }
      if(typeof cli==='object') return cli.nombre||cli.name||cli.cliente||'';
      return String(cli);
    }
    function escapeHtml(str){ if(str==null) return ''; return String(str).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
    function escapeHtmlAttr(str){ return escapeHtml(str).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

    function shouldIncludeVenta(v){
      if(v.deleted_at || v.eliminada || v.activa===false) return false;
      if(!v.cotizacion_id) return false;
      return approvedCotIds.has(v.cotizacion_id);
    }

    document.addEventListener('DOMContentLoaded', ()=>{
      const filtro=document.getElementById('filtro-estado');
      if(filtro) filtro.value='todos';
      bootstrapVentas(4);
      window.addEventListener('storage', e=>{ if(e.key==='ventas_updated_at') bootstrapVentas(2); });
      try{
        const bc=new BroadcastChannel('byt-ventas');
        bc.onmessage=ev=>{ if(ev.data?.type==='ventas-updated') bootstrapVentas(2); };
      }catch{}
    });

    async function bootstrapVentas(retries=2){
      try{ await cargarVentas(); }
      catch(e){
        console.error('cargarVentas fallo:',e);
        if(retries>0) setTimeout(()=>bootstrapVentas(retries-1),800);
        else document.getElementById('proyectos-wrapper').innerHTML='<div class="empty"><span class="state-icon">😵‍💫</span>Error cargando ventas</div>';
      }
    }

    async function cargarVentas(){
      const pw=document.getElementById('proyectos-wrapper');
      pw.innerHTML='<div class="empty"><span class="state-icon">⏳</span>Cargando ventas...</div>';

      const sbClient=await waitForSupabaseClient();
      const sb=await waitForSupabase();

      if(sbClient.init) await sbClient.init();

      const {data:cotAprob,error:errCot}=await sb.from('cotizaciones').select('id').eq('estado','aprobada');
      if(errCot) throw errCot;
      approvedCotIds=new Set((cotAprob||[]).map(c=>c.id));
      if(approvedCotIds.size===0){
        pw.innerHTML='<div class="empty"><span class="state-icon">📁</span>No hay cotizaciones aprobadas</div>';
        ventasData=ventasFiltradas=[];
        buildProyectos(); renderProyectos(); renderPartidas(); renderResumen();
        return;
      }

      const res=await sbClient.listarVentas();
      if(!res.success) throw new Error(res.error||'listarVentas sin éxito');
      ventasData=(res.data||[]).filter(shouldIncludeVenta);

      ventasData.forEach(v=>{
        if(v.cotizacion_id && v.fecha_entrega_limite){
          proyectoFechaEntregaMap.set(v.cotizacion_id, v.fecha_entrega_limite);
        }
      });

      ventasFiltradas=ventasData;
      aplicarFiltros();
    }

    function aplicarFiltros(){
      const txt=document.getElementById('filtro-texto').value.toLowerCase().trim();
      const est=document.getElementById('filtro-estado').value;
      ventasFiltradas=ventasData.filter(v=>{
        const st=normalizeEstado(v)||'en_ejecucion';
        const matchTxt=!txt ||
          (v.proyecto||'').toLowerCase().includes(txt) ||
          (v.partida_nombre||v.partida||'').toLowerCase().includes(txt);
        const matchEst=est==='todos' ? true : (est==='aprobada' ? true : st===est);
        return matchTxt && matchEst;
      });
      buildProyectos();
      renderProyectos();
      renderPartidas();
      renderResumen();
    }

    function buildProyectos(){
      const map=new Map();
      ventasFiltradas.forEach(v=>{
        const key=v.cotizacion_id || v.proyecto || 'Sin proyecto';
        if(!map.has(key)) map.set(key,[]);
        map.get(key).push(v);
      });
      proyectos=Array.from(map.entries()).map(([key,items])=>{
        const first=items[0]||{};
        const displayName=(first.proyecto||'Sin proyecto').trim();
        const totalCotizadoBase=Number(first.total_cotizado||0);
        const totalCobradoBase=Number(first.total_venta||0);
        const totalCobrado=proyectoCobradoMap.has(key)?proyectoCobradoMap.get(key):totalCobradoBase;
        const cliente=formatCliente(first.cliente);
        const fechaEntrega =
          proyectoFechaEntregaMap.get(key) ??
          (items.find(i=>i.fecha_entrega_limite)?.fecha_entrega_limite) ??
          '';
        const cotizacionId=first.cotizacion_id;
        const proyectoId=first.proyecto_id || key;
        const allGreen=items.every(it=>['completada','cancelada'].includes(normalizeEstado(it)));
        const motivo=first.motivo_variacion;
        if(motivo && !motivoVariacionMap.has(key)) motivoVariacionMap.set(key, motivo);

        return {
          key, displayName, proyectoId, cotizacionId, cliente, fechaEntrega,
          totalCobrado, totalCotizado: totalCotizadoBase, items, allGreen
        };
      });
      if(!selectedProyectoKey && proyectos.length) selectedProyectoKey=proyectos[0].key;
      if(selectedProyectoKey && !proyectos.find(p=>p.key===selectedProyectoKey)) selectedProyectoKey=null;
    }

    /* ============================================================
       VIEW MODE (preparado para futuro modo "cards dashboard")
       ============================================================ */
    let viewMode = 'table'; // "table" | "cards"

    function renderProyectos(){
      if(viewMode === 'cards') return renderProyectosCards();
      return renderProyectosTable();
    }

    function renderProyectosTable(){
      const pw=document.getElementById('proyectos-wrapper');
      if(!proyectos.length){
        pw.innerHTML='<div class="empty"><span class="state-icon">📁</span>No hay proyectos</div>';
        return;
      }
      const blocks=proyectos.map(p=>{
        const isOpen=p.key===selectedProyectoKey;
        const dotClass=p.allGreen?'dot-ok':'dot-bad';
        const totalCobrado=proyectoCobradoMap.has(p.key)?proyectoCobradoMap.get(p.key):p.totalCobrado;
        const fechaInput=(p.fechaEntrega||'').slice(0,10);
        const keyAttr=escapeHtmlAttr(p.key);
        return `
          <div class="project-block" data-key="${keyAttr}">
            <div class="project-row project-row-grid ${isOpen?'open':''}"
                 data-key="${keyAttr}"
                 onclick="toggleProyecto('${keyAttr}')">
              <div class="pcell dot"><span class="dot-status ${dotClass}"></span></div>
              <div class="pcell name">${escapeHtml(p.displayName)}</div>
              <div class="pcell fecha">
                <input class="fecha-entrega-input"
                       type="text"
                       data-proyecto-key="${keyAttr}"
                       value="${escapeHtmlAttr(fechaInput)}"
                       onclick="event.stopPropagation();"
                       onmousedown="event.stopPropagation();">
              </div>
              <div class="pcell cliente">${escapeHtml(p.cliente||'')}</div>
              <div class="pcell cotizado">${escapeHtml(fmt(p.totalCotizado))}</div>
              <div class="pcell cobrado">
                <input type="text" inputmode="decimal"
                       value="${escapeHtml(fmt(totalCobrado))}"
                       onclick="event.stopPropagation();"
                       onmousedown="event.stopPropagation();"
                       onfocus="event.stopPropagation(); this.value = parseMoney(this.value); this.select();"
                       onblur="handleCobradoBlur('${keyAttr}', this.value)">
              </div>
              <div class="pcell actions">
                <div class="actions">
                  <button class="btn btn-ghost" onclick="event.stopPropagation(); verCotizacion('${escapeHtmlAttr(p.cotizacionId||'')}')">Ver cotización</button>
                </div>
              </div>
            </div>
            <div class="project-details-row" data-details-key="${keyAttr}">
              <div class="project-details-inner">
                <div class="panel partidas-panel" data-partidas-key="${keyAttr}">
                  ${renderPartidasHTML(p)}
                </div>
                <div class="panel resumen-panel" data-resumen-key="${keyAttr}">
                  ${renderResumenHTML(p)}
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');

      pw.innerHTML=`
        <div class="projects-list">
          <div class="projects-header">
            <div class="pcell">&nbsp;</div>
            <div class="pcell">Proyecto</div>
            <div class="pcell">Fecha entrega</div>
            <div class="pcell">Cliente</div>
            <div class="pcell">Cotizado</div>
            <div class="pcell">Cobrado</div>
            <div class="pcell actions">Acciones</div>
          </div>
          ${blocks}
        </div>
      `;

      initFechaPickers();
      applyStateStyles();

      // Animación de entrada con requestAnimationFrame
      if(selectedProyectoKey){
        const det=pw.querySelector(`.project-details-row[data-details-key="${cssEscape(selectedProyectoKey)}"]`);
        if(det){
          requestAnimationFrame(()=>{ openDetailsRow(det); });
        }
      }
    }

    // Placeholder para futura vista en cards
    function renderProyectosCards(){
      const pw=document.getElementById('proyectos-wrapper');
      pw.innerHTML='<div class="empty"><span class="state-icon">🪄</span>Modo "cards" pendiente de implementar.</div>';
    }

    function openDetailsRow(det){
      // Doble rAF: el primero deja al navegador aplicar el estado inicial (max-height:0),
      // el segundo dispara la transición hacia el estado abierto en el siguiente frame.
      requestAnimationFrame(()=>{
        // Trick para altura fluida: fijar max-height al scrollHeight real del contenido.
        det.style.maxHeight = det.scrollHeight + 'px';
        requestAnimationFrame(()=>{ det.classList.add('open'); });
      });
    }

    function cssEscape(str){
      if(window.CSS && CSS.escape) return CSS.escape(String(str));
      // Escapa los caracteres con significado en selectores CSS (W3C CSS.escape polyfill simplificado).
      return String(str).replace(/(["\\\[\]\(\)\.\#\:\>\+\~\*\^\$\|\?\!\=\,\;\{\}\@\&\%\/\s])/g,'\\$1');
    }

    function toggleProyecto(key){
      const same = selectedProyectoKey === key;
      // Cerrar el actualmente abierto
      document.querySelectorAll('.project-details-row.open').forEach(el=>{
        el.classList.remove('open');
        el.style.maxHeight = ''; // limpia el inline style para que CSS (max-height:0) lo cierre
      });
      document.querySelectorAll('.project-row.open').forEach(el=>el.classList.remove('open'));

      if(same){
        selectedProyectoKey = null;
        return;
      }
      selectedProyectoKey = key;
      const row = document.querySelector(`.project-row[data-key="${cssEscape(key)}"]`);
      const det = document.querySelector(`.project-details-row[data-details-key="${cssEscape(key)}"]`);
      if(row) row.classList.add('open');
      if(det){
        // Refrescar contenido por si hubo cambios externos
        const proyecto = proyectos.find(p=>p.key===key);
        if(proyecto){
          const partPanel = det.querySelector('.partidas-panel');
          const resPanel  = det.querySelector('.resumen-panel');
          if(partPanel) partPanel.innerHTML = renderPartidasHTML(proyecto);
          if(resPanel)  resPanel.innerHTML  = renderResumenHTML(proyecto);
          applyStateStyles();
        }
        openDetailsRow(det);
      }
    }

    // Mantenido por compatibilidad: actualizar sólo el panel de partidas del proyecto abierto
    function renderPartidas(){
      if(!selectedProyectoKey) return;
      const proyecto = proyectos.find(p=>p.key===selectedProyectoKey);
      if(!proyecto) return;
      const panel = document.querySelector(`.partidas-panel[data-partidas-key="${cssEscape(selectedProyectoKey)}"]`);
      if(!panel) return;
      panel.innerHTML = renderPartidasHTML(proyecto);
      applyStateStyles();
    }

    // Mantenido por compatibilidad: actualizar sólo el panel de resumen del proyecto abierto
    function renderResumen(){
      if(!selectedProyectoKey) return;
      const proyecto = proyectos.find(p=>p.key===selectedProyectoKey);
      if(!proyecto) return;
      const panel = document.querySelector(`.resumen-panel[data-resumen-key="${cssEscape(selectedProyectoKey)}"]`);
      if(!panel) return;
      panel.innerHTML = renderResumenHTML(proyecto);
    }

    /* ============================================================
       Generadores HTML reutilizables (sin tocar lógica protegida)
       ============================================================ */
    function renderPartidasHTML(proyecto){
      if(!proyecto || !proyecto.items?.length){
        return `<h4>Partidas</h4><div class="empty"><span class="state-icon">📁</span>Este proyecto no tiene partidas.</div>`;
      }
      const rows=proyecto.items.map(item=>{
        const partidaId=item.id||item.partida_id||item.partida_nombre||item.partida;
        const stNorm=normalizeEstado(item);
        return `
          <tr>
            <td style="width:170px;">
              <select class="state-select ${stateClass(stNorm)}"
                      onclick="event.stopPropagation();"
                      onmousedown="event.stopPropagation();"
                      onchange="handleEstadoPartidaChange(event, '${escapeHtmlAttr(partidaId)}')">
                ${ESTADOS.map(st=>`<option value="${st}" ${stNorm===st?'selected':''}>${labelEstado(st)}</option>`).join('')}
              </select>
            </td>
            <td>${escapeHtml(item.partida_nombre||item.partida||'Partida')}</td>
          </tr>
        `;
      }).join('');
      return `
        <h4>Partidas · ${escapeHtml(proyecto.displayName)} (${proyecto.items.length})</h4>
        <div style="overflow-x:auto;">
          <table class="partidas-table">
            <thead>
              <tr>
                <th>Status</th>
                <th>Nombre partida</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      `;
    }

    function renderResumenHTML(proyecto){
      if(!proyecto){
        return `<h4>Resumen</h4><div class="empty"><span class="state-icon">ℹ️</span>Sin datos.</div>`;
      }
      const totalCotizado=proyecto.totalCotizado||0;
      const totalCobrado=proyectoCobradoMap.has(proyecto.key)
        ? proyectoCobradoMap.get(proyecto.key)
        : proyecto.totalCobrado||0;

      const diffRaw=totalCobrado-totalCotizado;
      const diferencia=Math.abs(diffRaw)<1e-6 ? 0 : diffRaw;
      const diffSign=diferencia>0?'+':(diferencia<0?'−':'±');
      const diffClass=diferencia>0?'diff-pos':(diferencia<0?'diff-neg':'diff-neutral');
      const diffAbs=Math.abs(diferencia);

      const motivoSel=motivoVariacionMap.get(proyecto.key)||'';
      const motivoAjusteIVA=motivoSel==='Ajuste tributario (IVA u otros impuestos)';

      const total=totalCobrado;
      const subtotal=motivoAjusteIVA ? total : (total/1.19);
      const iva=motivoAjusteIVA ? 0 : (total - subtotal);

      let optionsHtml='';
      if(diferencia>0){
        optionsHtml=MOTIVOS_SUBIDA.map(m=>`<option value="${escapeHtmlAttr(m)}" ${motivoSel===m?'selected':''}>${escapeHtml(m)}</option>`).join('');
      }else if(diferencia<0){
        optionsHtml=MOTIVOS_BAJADA.map(m=>`<option value="${escapeHtmlAttr(m)}" ${motivoSel===m?'selected':''}>${escapeHtml(m)}</option>`).join('');
      }

      const diffPill=diferencia===0
        ? `<span class="diff-chip diff-neutral"><span class="diff-sign">±</span><span>${escapeHtml(fmt(0))}</span></span>`
        : `<span class="diff-chip ${diffClass}"><span class="diff-sign">${diffSign}</span><span>${escapeHtml(fmt(diffAbs))}</span></span>`;

      const selectMotivos=diferencia===0
        ? `<div class="resumen-label" style="margin-top:4px;">Sin diferencia</div>`
        : `
          <select onclick="event.stopPropagation();" onmousedown="event.stopPropagation();"
                  onchange="handleMotivoChange('${escapeHtmlAttr(proyecto.key)}', this.value)">
            <option value="">Selecciona motivo</option>
            ${optionsHtml}
          </select>
        `;

      return `
        <h4>Resumen · ${escapeHtml(proyecto.displayName)}</h4>
        <div style="display:flex; flex-direction:column; gap:10px; font-size:14px;">
          <div class="resumen-row">
            <span class="resumen-label">Precio cotizado</span>
            <span class="resumen-value">${escapeHtml(fmt(totalCotizado))}</span>
          </div>
          <div class="resumen-row">
            <span class="resumen-label">Precio cobrado</span>
            <span class="resumen-value">${escapeHtml(fmt(totalCobrado))}</span>
          </div>
          <div class="resumen-row" style="align-items:center; gap:8px;">
            <span class="resumen-label">Diferencia</span>
            ${diffPill}
          </div>
          <div>
            <span class="resumen-label" style="display:block; margin-bottom:6px;">Motivo de la variación</span>
            ${selectMotivos}
          </div>
          <hr class="resumen-divider">
          <div class="resumen-row"><span>Subtotal</span><span class="money">${escapeHtml(fmt(subtotal))}</span></div>
          <div class="resumen-row"><span>IVA (19%)</span><span class="money">${escapeHtml(fmt(iva))}</span></div>
          <hr class="resumen-divider">
          <div class="resumen-row" style="font-weight:800; font-size:15px;"><span>Total</span><span class="money">${escapeHtml(fmt(total))}</span></div>
        </div>
      `;
    }

    function initFechaPickers(){
      fpInstances.forEach(inst=>inst.destroy());
      fpInstances=[];
      document.querySelectorAll('.fecha-entrega-input').forEach(inp=>{
        const key=inp.dataset.proyectoKey;
        const inst=flatpickr(inp,{
          dateFormat:'Y-m-d',
          defaultDate: inp.value || null,
          showMonths:2,
          allowInput:true,
          position:'auto center',
          locale: {...flatpickr.l10ns.es, firstDayOfWeek:1},
          onChange:(selectedDates,dateStr)=>handleEntregaChange(key,dateStr)
        });
        fpInstances.push(inst);
      });
    }

    function selectProyecto(key){ toggleProyecto(key); }

    function labelEstado(st){ switch(st){
      case 'aprobada': return 'Aprobada';
      case 'en_ejecucion': return 'En ejecución';
      case 'completada': return 'Completada';
      case 'cancelada': return 'Cancelada';
      case 'postventa': return 'Postventa';
      default: return st;
    }}
    function stateClass(st){ switch(st){
      case 'aprobada': return 'st-aprobada';
      case 'en_ejecucion': return 'st-en_ejecucion';
      case 'completada': return 'st-completada';
      case 'cancelada': return 'st-cancelada';
      case 'postventa': return 'st-postventa';
      default: return '';
    }}
    function applyStateStyles(){
      document.querySelectorAll('select.state-select').forEach(sel=>{
        sel.classList.remove('st-aprobada','st-en_ejecucion','st-completada','st-cancelada','st-postventa');
        sel.classList.add(stateClass(sel.value));
      });
    }

    async function persistVenta(partidaId, patch){
      const row=ventasData.find(v=>(v.id||v.partida_id||v.partida_nombre||v.partida)===partidaId);
      if(!row || !row.id) return false;
      try{
        const res=await (await waitForSupabaseClient()).actualizarVenta(row.id, patch);
        if(!res?.success) throw new Error(res?.error || 'Error desconocido');
        return true;
      }catch(e){
        console.warn('persistVenta error', e);
        return false;
      }
    }

    function handleEstadoPartidaChange(e, partidaId){
      const nuevoEstado=e.target.value;
      ventasData=ventasData.map(v=>{
        const idv=v.id||v.partida_id||v.partida_nombre||v.partida;
        return idv===partidaId ? {...v, estado:nuevoEstado} : v;
      });
      persistVenta(partidaId,{estado:nuevoEstado});
      aplicarFiltros();
    }

    async function handleCobradoBlur(key, value){
      const num=parseMoney(value);
      const proyecto=proyectos.find(p=>p.key===key);
      if(proyecto && proyecto.items?.length){
        const first=proyecto.items[0];
        const pid=first.id||first.partida_id||first.partida_nombre||first.partida;
        ventasData=ventasData.map(v=>{
          const idv=v.id||v.partida_id||v.partida_nombre||v.partida;
          return idv===pid ? {...v, total_venta:num} : v;
        });
        ventasFiltradas=ventasFiltradas.map(v=>{
          const idv=v.id||v.partida_id||v.partida_nombre||v.partida;
          return idv===pid ? {...v, total_venta:num} : v;
        });
        await persistVenta(pid,{total_venta:num});
      }
      proyectoCobradoMap.set(key,num);
      buildProyectos();
      renderProyectos();
      renderResumen();
    }

    async function handleEntregaChange(key, value){
      const val=value || '';
      proyectoFechaEntregaMap.set(key, val);

      ventasData=ventasData.map(v=>v.cotizacion_id===key ? {...v, fecha_entrega_limite: val} : v);
      ventasFiltradas=ventasFiltradas.map(v=>v.cotizacion_id===key ? {...v, fecha_entrega_limite: val} : v);

      const rowToSave=ventasData.find(v=>v.cotizacion_id===key);
      if(rowToSave){
        await persistVenta(rowToSave.id, {fecha_entrega_limite: val || null});
      }

      buildProyectos();
      renderProyectos();
      renderPartidas();
    }

    function handlePartidaInput(partidaId, field, value){
      ventasData=ventasData.map(v=>{
        const idv=v.id||v.partida_id||v.partida_nombre||v.partida;
        if(idv===partidaId){
          const patch=field==='precio_individual_estimado'?Number(value||0):value;
          persistVenta(partidaId,{[field]:patch});
          return {...v,[field]:patch};
        }
        return v;
      });
      ventasFiltradas=ventasFiltradas.map(v=>{
        const idv=v.id||v.partida_id||v.partida_nombre||v.partida;
        if(idv===partidaId){
          const patch=field==='precio_individual_estimado'?Number(value||0):value;
          return {...v,[field]:patch};
        }
        return v;
      });
      aplicarFiltros();
    }

    async function handleMotivoChange(proyectoKey, value){
      motivoVariacionMap.set(proyectoKey, value);
      const proyecto=proyectos.find(p=>p.key===proyectoKey);
      if(proyecto && proyecto.items?.length){
        const first=proyecto.items[0];
        const pid=first.id||first.partida_id||first.partida_nombre||first.partida;
        ventasData=ventasData.map(v=>{
          const idv=v.id||v.partida_id||v.partida_nombre||v.partida;
          return idv===pid ? {...v, motivo_variacion:value} : v;
        });
        ventasFiltradas=ventasFiltradas.map(v=>{
          const idv=v.id||v.partida_id||v.partida_nombre||v.partida;
          return idv===pid ? {...v, motivo_variacion:value} : v;
        });
        await persistVenta(pid,{motivo_variacion:value});
      }
      renderResumen();
    }

    function verCotizacion(id){ if(!id) return; window.location.href=`../cotizaciones/detalle.html?id=${id}`; }

    function imprimirContrato(id){ window.utils?.mostrarNotificacion?.('Imprimir contrato aún no está disponible','info'); }

    /* Notas modal */
    function openNotesModal(partidaId, proyectoKey, proyectoNombre){
      notesModalState={partidaId, proyectoKey, proyectoNombre};
      const modal=document.getElementById('notes-modal');
      const textarea=document.getElementById('notes-textarea');
      const title=document.getElementById('notes-title');
      const partida=ventasData.find(v=>(v.id||v.partida_id||v.partida_nombre||v.partida)===partidaId);
      const nombrePartida=partida?.partida_nombre||partida?.partida||'Partida';
      title.textContent=`Observaciones · ${proyectoNombre||proyectoKey} · ${nombrePartida}`;
      textarea.value=notesStore.get(partidaId)||'';
      modal.style.display='flex';
      modal.setAttribute('aria-hidden','false');
      document.body.style.overflow='hidden';
    }
    function closeNotesModal(){
      const modal=document.getElementById('notes-modal');
      modal.style.display='none';
      modal.setAttribute('aria-hidden','true');
      document.body.style.overflow='';
      notesModalState={partidaId:null, proyectoKey:null, proyectoNombre:''};
    }
    function saveNotes(){
      const {partidaId}=notesModalState;
      if(!partidaId){ closeNotesModal(); return; }
      const textarea=document.getElementById('notes-textarea');
      const text=textarea.value.trim();
      notesStore.set(partidaId,text);
      closeNotesModal();
      renderPartidas();
    }
  </script>
</body>
