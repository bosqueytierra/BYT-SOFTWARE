<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estado de proyectos - BYT SOFTWARE</title>
  <link rel="stylesheet" href="../../styles/global.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <style>
    :root {
      --bg:#f6f7f8; --card:#fff; --border:#e4e7eb; --text:#2a2f36; --muted:#6b7280;
      --primary:#2e5e4e; --primary-soft:#3f705d; --chip:#eef2f7; --chip-text:#2f3b4c;
      --shadow:0 10px 30px rgba(0,0,0,0.08);
      --chip-green:#e9f7ef; --chip-red:#fdeceb; --chip-neutral:#f4f5f7;
      --chip-green-text:#1f9d55; --chip-red-text:#c0392b; --chip-neutral-text:#6b7280;
      --overlay:rgba(0,0,0,0.55);
    }
    *{box-sizing:border-box;}
    body{margin:0;font-family:"Inter","SF Pro Display","Roboto",system-ui,sans-serif;background:var(--bg);color:var(--text);}
    .page{max-width:1400px;width:96%;margin:22px auto 48px;}
    .header{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
    .header h2{margin:0;}
    .filters-card,.card{background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);}
    .filters-card{padding:14px;margin-bottom:14px;}
    .filters-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;}
    label{font-size:13px;color:var(--muted);font-weight:700;margin-bottom:6px;display:block;}
    input,select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:#fdfdfd;font-family:inherit;font-size:14px;color:var(--text);}
    .project-card{padding:14px;border-bottom:1px solid var(--border);}
    .project-head{display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer;}
    .project-left{display:flex;gap:10px;align-items:flex-start;}
    .chevron{display:inline-block;transition:transform .15s; font-size:16px; color:#4b5563; margin-top:3px;}
    details[open] .chevron{transform:rotate(90deg);}
    .project-title{margin:0;font-size:16px;font-weight:800;color:var(--text);}
    .project-meta{display:flex;flex-wrap:wrap;gap:8px;font-size:13px;color:var(--muted);}
    .actions{display:flex;gap:6px;flex-wrap:wrap;}
    .btn{border:1px solid var(--border);background:#fff;color:#1f2430;padding:8px 11px;border-radius:10px;cursor:pointer;font-weight:700;font-size:12px;display:inline-flex;align-items:center;gap:6px;}
    .btn:hover{border-color:#d0d5dd;}
    .btn-ghost{background:#f0f3f5;color:#1f2430;}
    .stage-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px;margin-top:12px;}
    .stage-item{border:1px solid var(--border);border-radius:12px;padding:10px;background:#fafafa;display:flex;flex-direction:column;gap:6px;position:relative;}
    .stage-name{font-weight:800;}
    .stage-owner{font-size:12px;color:#6b7280;}
    .stage-select{padding:8px 10px;border:1px solid var(--border);border-radius:10px;font-weight:700;}
    details[open] .project-head{border-bottom:1px solid var(--border);padding-bottom:10px;margin-bottom:10px;}
    .empty{padding:18px;text-align:center;color:var(--muted);}
    .partida-details{border:1px solid var(--border);border-radius:12px;padding:10px;margin:8px 0;background:#fdfdfd;}
    .partida-summary{display:flex;justify-content:space-between;align-items:center;gap:8px;cursor:pointer;}
    .partida-name{font-weight:700;}
    .partida-status{padding:6px 10px;border-radius:10px;font-weight:700;font-size:12px;}
    .p-pend{background:var(--chip-neutral);color:var(--chip-neutral-text);}
    .p-comp{background:var(--chip-green);color:var(--chip-green-text);}
    .progress-wrap{margin:8px 0 4px;width: clamp(240px, 24vw, 320px);max-width:100%;}
    .progress-bar{height:10px;border-radius:999px;background:#eceff1;overflow:hidden;width:100%;}
    .progress-fill{height:100%;border-radius:999px;transition:width .2s;}
    .progress-text{font-size:12px;color:var(--muted);font-weight:700;margin-top:4px;}

    /* Modal adjuntos grande */
    .adj-backdrop{position:fixed; inset:0; background:var(--overlay); display:none; align-items:center; justify-content:center; z-index:2000; padding:18px;}
    .adj-modal{background:#fff; border-radius:18px; max-width:1280px; width:96vw; border:1px solid var(--border); box-shadow:0 18px 40px rgba(0,0,0,0.18); max-height:94vh; display:flex; flex-direction:column;}
    .adj-head{padding:18px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; gap:12px;}
    .adj-title{margin:0; font-size:19px; font-weight:800;}
    .adj-sub{margin:2px 0 0; color:#6c7a86; font-size:13px;}
    .adj-close{border:none;background:transparent;font-size:22px;cursor:pointer;color:#6b7280;}
    .adj-body{padding:16px 18px; overflow:auto;}
    .adj-upload{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:10px;}
    .adj-btn{border:1px solid var(--border);background:#f8fafc;color:#1f2430;padding:9px 12px;border-radius:10px;cursor:pointer;font-weight:700;font-size:13px;}
    .adj-btn.primary{background:var(--primary);color:#fff;border-color:var(--primary);}
    .adj-note{padding:9px 10px;border:1px solid var(--border);border-radius:10px;flex:1;min-width:220px;}
    .adj-status{font-size:13px;color:var(--muted);margin-bottom:8px;}
    .adj-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;}
    .adj-card{border:1px solid var(--border);border-radius:12px;padding:10px;background:#fdfdfd;display:flex;flex-direction:column;gap:6px;}
    .adj-preview{height:170px;display:grid;place-items:center;background:#fff;border:1px dashed var(--border);border-radius:10px;overflow:hidden;}
    .adj-preview img{max-width:100%;max-height:100%;object-fit:contain;}
    .adj-name{font-weight:700;}
    .adj-meta{font-size:12px;color:#6b7280;}
    .adj-note-edit{width:100%;min-height:48px;border:1px solid var(--border);border-radius:10px;padding:8px;font-family:inherit;}
    .adj-actions{display:flex;gap:6px;flex-wrap:wrap;}
    .adj-smallbtn{border:1px solid var(--border);background:#fff;color:#1f2430;padding:6px 8px;border-radius:8px;font-size:12px;cursor:pointer;}
    .adj-smallbtn.danger{border-color:#fda4af;color:#b91c1c;}

    /* Previsualización instantánea */
    .pending-wrap{border:1px dashed var(--border);border-radius:12px;padding:10px;margin-bottom:12px;background:#fff;}
    .pending-title{font-weight:800;margin:6px 0 4px;font-size:14px;}
    .pending-note{color:#6b7280;font-size:12px;margin:0 0 8px;}

    /* Nota por etapa */
    .note-toggle{position:absolute; top:6px; right:6px; width:20px; height:20px; border-radius:4px; border:1px solid var(--border); background:#fff; cursor:pointer; font-size:12px; display:flex;align-items:center;justify-content:center;}
    .note-box{margin-top:6px; display:none;}
    .note-box textarea{width:100%; min-height:60px; border:1px solid var(--border); border-radius:8px; padding:6px; font-family:inherit; font-size:12px;}
    .note-box.show{display:block;}

    /* Overlay loader */
    .loader-backdrop{position:fixed; inset:0; background:rgba(0,0,0,0.35); display:none; align-items:center; justify-content:center; z-index:3000;}
    .spinner{width:70px;height:70px;border-radius:50%;border:6px solid #e5e7eb;border-top-color:var(--primary);animation:spin 0.9s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* Toast */
    .toast{position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#111827; color:#fff; padding:12px 18px; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.2); z-index:4000; display:none;}
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <button class="btn btn-ghost" onclick="window.history.back()">← Atrás</button>
      <h2 style="margin:0;">Estado de proyectos</h2>
    </div>

    <div class="filters-card">
      <div class="filters-grid">
        <div>
          <label>Buscar proyecto o cliente</label>
          <input id="filtro-texto" type="text" placeholder="Proyecto, cliente..." oninput="applyFiltersAndRender()">
        </div>
        <div>
          <label>Estado global</label>
          <select id="filtro-estado" onchange="applyFiltersAndRender()">
            <option value="todos" selected>Todos</option>
            <option value="abierto">Con partidas pendientes</option>
            <option value="completo">Todas completadas</option>
          </select>
        </div>
      </div>
    </div>

    <div id="proyectos-list" class="card"></div>
  </div>

  <!-- Modal adjuntos -->
  <div id="adj-modal-backdrop" class="adj-backdrop" aria-hidden="true">
    <div class="adj-modal">
      <div class="adj-head">
        <div>
          <h3 class="adj-title" id="adj-title">Archivos</h3>
          <p class="adj-sub">Cotización: <span id="adj-cot-id">-</span> · <span id="adj-subtipo"></span></p>
        </div>
        <button class="adj-close" onclick="closeAdjuntos()">×</button>
      </div>
      <div class="adj-body">
        <div class="adj-upload">
          <label class="adj-btn">
            📤 Seleccionar archivo(s)
            <input id="adj-file-input" type="file" multiple style="display:none;">
          </label>
          <input id="adj-nota-upload" class="adj-note" type="text" placeholder="Nota opcional para todos">
        </div>

        <div id="pending-wrapper" class="pending-wrap" style="display:none;">
          <div class="pending-title">Previsualización (se suben automáticamente)</div>
          <p class="pending-note">Al elegir archivos se suben al instante; espera el círculo de carga.</p>
          <div id="pending-grid" class="adj-grid"></div>
        </div>

        <div id="adj-status" class="adj-status">Sin cargar aún…</div>
        <div id="adj-grid" class="adj-grid"></div>
      </div>
    </div>
  </div>

  <!-- Loader global -->
  <div id="loader" class="loader-backdrop"><div class="spinner"></div></div>
  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>

  <script src="../../js/menuConfig.js"></script>
  <script src="../../js/layout.js"></script>
  <script src="../../lib/supabaseConfig.js"></script>
  <script type="module" src="../../js/supabaseBrowserClient.js"></script>
  <script type="module" src="../../js/globalSupabase.js"></script>

  <script>
    /* Etapas con responsables */
    const STAGES = [
      {name:'Diseño y Cierre', owner:'Luis'},
      {name:'Traspaso de informacion de proyecto', owner:'Luis → Jano - Jorge'},
      {name:'Rectificacion del espacio', owner:'Jorge - Jano'},
      {name:'Modelado de planta y mobiliario', owner:'Jorge'},
      {name:'Explicacion y revisión tecnica del proyecto', owner:'Jorge → Jano'},
      {name:'Explicacion y revisión de diseño', owner:'Jorge - Jano → Luis'},
      {name:'Ingreso de compra de quincalleria y otros', owner:'Jano'},
      {name:'Optimizado y estimación de tableros y tapacantos', owner:'Jorge'},
      {name:'Planos de armado', owner:'Jorge'},
      {name:'Compras de Melaminas y tapacantos', owner:'Luis - Jano'},
      {name:'Cortes en taller', owner:'Taller'},
      {name:'Listo para instalar', owner:'Tallerar'}
    ];

    const ADJ_BUCKETS = { skp:'skp', diagrama:'diagramas_corte', planos:'planos_armado', cotizacion:'cotizaciones' };
    const ADJ_LABELS = { skp:'SKP', diagrama:'Diagrama de corte', planos:'Planos de Armado', cotizacion:'Adjuntos Cotización' };

    let proyectos = [];
    let filtered = [];
    let stageStore = new Map();            // partidaId -> { stageName: status }
    let stageNotesByPartida = new Map();   // partidaId -> { stageName: nota }
    let globalStageNotes = {};             // stageName -> nota global
    let openProjects = new Set();
    let openPartidas = new Set();
    let adjContext = { tipo:'cotizacion', bucket:ADJ_BUCKETS.cotizacion, cotId:null };
    let pendingFiles = [];
    let isUploading = false;               // evita doble subida

    const wait = (ms)=>new Promise(r=>setTimeout(r,ms));
    async function waitForSupabase(maxMs=12000){
      const start=Date.now();
      while(Date.now()-start<maxMs){
        if(window.supabase && typeof window.supabase.from==='function') return window.supabase;
        await wait(250);
      }
      throw new Error('supabase no disponible');
    }
    async function waitForSupabaseClient(maxMs=12000){
      const start=Date.now();
      while(Date.now()-start<maxMs){
        if(window.supabaseClient && typeof window.supabaseClient.listarVentas==='function') return window.supabaseClient;
        await wait(250);
      }
      throw new Error('supabaseClient no disponible');
    }
    const esc = (s)=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[m]||m));
    const attr = (s)=>esc(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');

    function showLoader(flag){document.getElementById('loader').style.display=flag?'flex':'none';}
    function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',1800);}

    document.addEventListener('DOMContentLoaded',()=>bootstrapEstado());

    async function bootstrapEstado(){
      try{
        await cargarDatos();
        await cargarNotasEtapas();
        applyFiltersAndRender();
        wireFileInput(); // asegurar handler único
      }catch(e){
        console.error(e);
        document.getElementById('proyectos-list').innerHTML='<div class="empty">No se pudo cargar información</div>';
      }
    }

    async function cargarDatos(){
      const sbClient = await waitForSupabaseClient();
      const sb = await waitForSupabase();
      if(sbClient.init) await sbClient.init();

      const {data:cotAprob,error:errCot}=await sb.from('cotizaciones').select('id').eq('estado','aprobada');
      if(errCot) throw errCot;
      const approved = new Set((cotAprob||[]).map(c=>c.id));

      const res=await sbClient.listarVentas();
      if(!res.success) throw new Error(res.error||'listarVentas sin éxito');
      const ventas=(res.data||[]).filter(v=>approved.has(v.cotizacion_id));

      const map=new Map();
      ventas.forEach(v=>{
        const key=v.cotizacion_id || v.proyecto || 'sin-key';
        const estadoPart= (v.estado||'').trim();
        if(!map.has(key)) map.set(key,{
          key,
          display:v.proyecto||'Proyecto sin nombre',
          cliente:parseCliente(v.cliente),
          cotizacionId:v.cotizacion_id,
          partidas:[]
        });
        map.get(key).partidas.push({
          id:v.id || v.partida_id || v.partida_nombre || v.partida,
          nombre:v.partida_nombre || v.partida || 'Partida',
          estado: estadoPart || 'en_ejecucion'
        });
      });

      proyectos = Array.from(map.values());
      loadStageStore();
    }

    async function cargarNotasEtapas(){
      const sb = await waitForSupabase();
      const { data:partData } = await sb.from('etapa_notas')
        .select('partida_id, etapa, nota')
        .not('partida_id','is',null);
      const m=new Map();
      (partData||[]).forEach(r=>{
        if(!m.has(r.partida_id)) m.set(r.partida_id,{});
        m.get(r.partida_id)[r.etapa]=r.nota||'';
      });
      stageNotesByPartida = m;

      const { data:globData } = await sb.from('etapa_notas')
        .select('etapa, nota')
        .is('partida_id', null);
      globalStageNotes = {};
      (globData||[]).forEach(r=>{ globalStageNotes[r.etapa]=r.nota||''; });
    }

    function parseCliente(cli){
      if(!cli) return '';
      if(typeof cli==='string'){
        try{const o=JSON.parse(cli);return o.nombre||o.name||o.cliente||cli;}catch{return cli;}
      }
      if(typeof cli==='object') return cli.nombre||cli.name||cli.cliente||'';
      return String(cli);
    }

    function loadStageStore(){
      try{
        const raw=localStorage.getItem('byt_estado_proyectos_stages_v2');
        if(raw){
          const obj=JSON.parse(raw);
          Object.keys(obj).forEach(k=>stageStore.set(k,obj[k]));
        }
      }catch{}
    }
    function saveStageStore(){
      const obj={};
      stageStore.forEach((v,k)=>{obj[k]=v;});
      localStorage.setItem('byt_estado_proyectos_stages_v2', JSON.stringify(obj));
    }

    function captureOpenState(){
      openProjects.clear(); openPartidas.clear();
      document.querySelectorAll('details.project-card[open]').forEach(d=>{
        openProjects.add(d.dataset.projKey);
        d.querySelectorAll('details.partida-details[open]').forEach(p=>{
          openPartidas.add(p.dataset.partidaId);
        });
      });
    }
    function applyFiltersAndRender(){
      captureOpenState();
      const txt=document.getElementById('filtro-texto').value.toLowerCase().trim();
      const est=document.getElementById('filtro-estado').value;

      filtered = proyectos.filter(p=>{
        const pend = p.partidas.some(pt=>pt.estado!=='completada');
        const matchTxt = !txt || p.display.toLowerCase().includes(txt) || p.cliente.toLowerCase().includes(txt);
        const matchEst = est==='todos' ? true : (est==='abierto'? pend : !pend);
        return matchTxt && matchEst;
      });

      filtered.sort((a,b)=>{
        const pa = a.partidas.some(pt=>pt.estado!=='completada') ? 0 : 1;
        const pb = b.partidas.some(pt=>pt.estado!=='completada') ? 0 : 1;
        if(pa!==pb) return pa-pb;
        return (a.display||'').localeCompare(b.display||'');
      });

      renderProyectos();
    }

    function computeProgress(proj){
      let total=0, done=0;
      proj.partidas.forEach(pt=>{
        const stMap = stageStore.get(pt.id) || {};
        STAGES.forEach(s=>{
          total += 1;
          if(stMap[s.name]==='listo') done += 1;
        });
      });
      const percent = total ? Math.round((done/total)*100) : 0;
      return { total, done, percent };
    }

    function renderProyectos(){
      const list=document.getElementById('proyectos-list');
      if(!filtered.length){
        list.innerHTML='<div class="empty">No hay proyectos para los filtros aplicados.</div>';
        return;
      }
      const html=filtered.map(proj=>{
        const pendientes = proj.partidas.filter(p=>p.estado!=='completada').length;
        const prog = computeProgress(proj);
        const gradient = 'linear-gradient(90deg, #e53e3e 0%, #f6ad55 50%, #38a169 100%)';
        const openProj = openProjects.has(proj.key);

        return `
          <details class="project-card" data-proj-key="${attr(proj.key)}" ${openProj?'open':''}>
            <summary class="project-head">
              <div class="project-left">
                <span class="chevron">▸</span>
                <div>
                  <p class="project-title">${esc(proj.display)}</p>
                  <div class="project-meta">
                    <span>Cliente: ${esc(proj.cliente||'N/A')}</span>
                    <span>Partidas pendientes: ${pendientes}</span>
                  </div>
                  <div class="progress-wrap">
                    <div class="progress-bar"><div class="progress-fill" style="width:${prog.percent}%; background:${gradient};"></div></div>
                    <div class="progress-text">${prog.percent}% completado (Listos ${prog.done}/${prog.total})</div>
                  </div>
                </div>
              </div>
              <div class="actions">
                <button type="button" class="btn btn-ghost" onclick="event.stopPropagation(); verCotizacion('${attr(proj.cotizacionId||'')}')">Ver cotización</button>
                <button type="button" class="btn btn-ghost" onclick="event.stopPropagation(); openAdj('${attr(proj.cotizacionId||'')}','skp')">SKP</button>
                <button type="button" class="btn btn-ghost" onclick="event.stopPropagation(); openAdj('${attr(proj.cotizacionId||'')}','diagrama')">Diagrama de corte</button>
                <button type="button" class="btn btn-ghost" onclick="event.stopPropagation(); openAdj('${attr(proj.cotizacionId||'')}','planos')">Planos de Armado</button>
                <button type="button" class="btn btn-ghost" onclick="event.stopPropagation(); openAdj('${attr(proj.cotizacionId||'')}','cotizacion')">Adjuntos Cotización</button>
              </div>
            </summary>

            <div class="project-meta" style="margin:8px 0 6px;">Partidas:</div>
            ${proj.partidas.map(pt=>{
              const pending = pt.estado!=='completada';
              const stMap = stageStore.get(pt.id) || {};
              const notes = stageNotesByPartida.get(pt.id) || {};
              const openPart = openPartidas.has(pt.id);
              return `
                <details class="partida-details" data-partida-id="${attr(pt.id)}" ${openPart?'open':''}>
                  <summary class="partida-summary">
                    <span class="partida-name">${esc(pt.nombre)}</span>
                    <span class="partida-status ${pending?'p-pend':'p-comp'}">${pending?'Pendiente':'Completada'}</span>
                  </summary>
                  <div class="stage-grid">
                    ${STAGES.map(stage=>{
                      const value = stMap[stage.name] || 'pendiente';
                      const nota = notes[stage.name] ?? globalStageNotes[stage.name] ?? '';
                      const noteId = `note-${pt.id}-${stage.name}`;
                      return `
                        <div class="stage-item">
                          <button class="note-toggle" onclick="toggleNote('${attr(noteId)}')" title="Agregar nota">▾</button>
                          <span class="stage-name">${esc(stage.name)}</span>
                          <span class="stage-owner">${esc(stage.owner)}</span>
                          <select class="stage-select" onchange="setStage('${attr(pt.id)}','${attr(stage.name)}', this.value)">
                            <option value="pendiente" ${value==='pendiente'?'selected':''}>Pendiente</option>
                            <option value="en_progreso" ${value==='en_progreso'?'selected':''}>En progreso</option>
                            <option value="listo" ${value==='listo'?'selected':''}>Listo</option>
                          </select>
                          <div id="${attr(noteId)}" class="note-box">
                            <textarea data-stage="${attr(stage.name)}" placeholder="Descripción / comentarios" onblur="saveStageNote('${attr(pt.id)}','${attr(stage.name)}', this.value)">${esc(nota)}</textarea>
                          </div>
                        </div>
                      `;
                    }).join('')}
                  </div>
                </details>
              `;
            }).join('')}
          </details>
        `;
      }).join('');
      list.innerHTML=html;
    }

    function toggleNote(id){
      const box=document.getElementById(id);
      if(!box) return;
      box.classList.toggle('show');
    }

    function setStage(partidaId, stage, value){
      const current = stageStore.get(partidaId) || {};
      current[stage] = value;
      stageStore.set(partidaId, current);
      saveStageStore();
      applyFiltersAndRender();
    }

    function refreshStageNotesInDOM(etapa, nota){
      document.querySelectorAll(`.note-box textarea[data-stage="${CSS.escape(etapa)}"]`).forEach(t=>{
        t.value = nota;
      });
    }

    async function saveStageNote(partidaId, etapa, nota){
      const sb=await waitForSupabase();
      // guardar específico
      const current = stageNotesByPartida.get(partidaId) || {};
      current[etapa]=nota;
      stageNotesByPartida.set(partidaId,current);
      await sb.from('etapa_notas').upsert({ partida_id: partidaId, etapa, nota });
      // guardar global (replicar)
      globalStageNotes[etapa]=nota;
      await sb.from('etapa_notas').upsert({ partida_id: null, etapa, nota });
      refreshStageNotesInDOM(etapa, nota);
      toast('Nota guardada');
    }

    /* ------------ Adjuntos ------------- */
    function wireFileInput(){
      const old = document.getElementById('adj-file-input');
      if(old){
        const clone = old.cloneNode(true);
        old.replaceWith(clone); // elimina listeners previos
      }
      const input = document.getElementById('adj-file-input');
      input.addEventListener('change', async (e)=>{
        const files = Array.from(e.target.files||[]);
        if(!files.length){ toast('Selecciona archivo(s)'); return; }
        pendingFiles = files;
        renderPendingPreviews();
        await autoUpload(files);
      });
    }

    async function openAdj(cotId, tipo){
      if(!cotId) return;
      pendingFiles = [];
      renderPendingPreviews();
      adjContext.tipo = tipo;
      adjContext.bucket = ADJ_BUCKETS[tipo] || ADJ_BUCKETS.cotizacion;
      adjContext.cotId = cotId;
      document.getElementById('adj-title').textContent = ADJ_LABELS[tipo] || 'Archivos';
      document.getElementById('adj-subtipo').textContent = tipo;
      document.getElementById('adj-cot-id').textContent = cotId;
      const modal=document.getElementById('adj-modal-backdrop');
      modal.style.display='flex';
      modal.setAttribute('aria-hidden','false');
      document.body.style.overflow='hidden';
      document.getElementById('adj-nota-upload').style.display = (tipo==='cotizacion') ? 'block' : 'none';
      document.getElementById('adj-file-input').value='';
      wireFileInput(); // reengancha listener por seguridad
      await cargarAdjuntos();
    }
    function closeAdjuntos(){
      const modal=document.getElementById('adj-modal-backdrop');
      modal.style.display='none';
      modal.setAttribute('aria-hidden','true');
      document.body.style.overflow='';
      document.getElementById('adj-grid').innerHTML='';
      document.getElementById('adj-status').textContent='Sin cargar aún…';
      document.getElementById('adj-file-input').value='';
      document.getElementById('adj-nota-upload').value='';
      pendingFiles = [];
      renderPendingPreviews();
    }

    function renderPendingPreviews(){
      const wrap=document.getElementById('pending-wrapper');
      const grid=document.getElementById('pending-grid');
      if(!pendingFiles.length){
        wrap.style.display='none';
        grid.innerHTML='';
        return;
      }
      wrap.style.display='block';
      grid.innerHTML = pendingFiles.map(f=>{
        const url = f.type.startsWith('image/') ? URL.createObjectURL(f) : null;
        const sizeMB = (f.size/1024/1024).toFixed(2)+' MB';
        return `
          <div class="adj-card">
            <div class="adj-preview">${url?`<img src="${url}" alt="">`:`<span style="font-size:32px;color:#9ca3af;">📁</span>`}</div>
            <div class="adj-name">${esc(f.name)}</div>
            <div class="adj-meta">${esc(f.type||'archivo')} · ${sizeMB}</div>
          </div>
        `;
      }).join('');
    }

    async function autoUpload(files){
      if(isUploading) return;   // evita doble disparo
      isUploading = true;
      showLoader(true);
      const sb=await waitForSupabase();
      const note=document.getElementById('adj-nota-upload').value.trim();
      try{
        const uploads = files.map(async file=>{
          const path=`${adjContext.cotId}/${Date.now()}-${file.name}`;
          const { error:upErr } = await sb.storage.from(adjContext.bucket)
            .upload(path, file, { cacheControl:'3600', upsert:false });
          if(upErr) throw upErr;
          if(adjContext.bucket===ADJ_BUCKETS.cotizacion){
            await sb.from('cotizacion_files').insert({
              cotizacion_id: adjContext.cotId,
              path,
              filename:file.name,
              size:file.size,
              content_type:file.type,
              nota: note || null
            });
          }
        });
        await Promise.all(uploads);
        toast('Archivo(s) subidos');
        pendingFiles = [];
        document.getElementById('adj-file-input').value='';
        renderPendingPreviews();
        await cargarAdjuntos();
      }catch(e){
        console.error(e);
        toast('Error subiendo: '+(e.message||''));
      }finally{
        showLoader(false);
        isUploading = false;
      }
    }

    async function cargarAdjuntos(){
      const sb = await waitForSupabase();
      const grid = document.getElementById('adj-grid');
      const status = document.getElementById('adj-status');
      status.textContent='Cargando...';
      grid.innerHTML='';
      const { data:list, error } = await sb
        .storage.from(adjContext.bucket)
        .list(`${adjContext.cotId}/`, { limit:200, sortBy:{column:'created_at',order:'desc'} });
      if(error){ status.textContent='Error: '+error.message; return; }
      if(!list || !list.length){ status.textContent='No hay archivos para esta cotización.'; return; }

      let notasMap = new Map();
      if(adjContext.bucket === ADJ_BUCKETS.cotizacion){
        const { data:meta } = await sb.from('cotizacion_files')
          .select('id,path,nota')
          .eq('cotizacion_id', adjContext.cotId);
        (meta||[]).forEach(m=>notasMap.set(m.path, {id:m.id, nota:m.nota||''}));
      }

      const signed = await Promise.all(list.map(async f=>{
        const path=`${adjContext.cotId}/${f.name}`;
        const { data:signed } = await sb.storage.from(adjContext.bucket).createSignedUrl(path, 3600);
        return { ...f, path, signedUrl:signed?.signedUrl||null };
      }));

      grid.innerHTML = signed.map(f=>{
        const notaObj = notasMap.get(f.path) || {};
        const isImg=/\.(png|jpe?g|gif|webp|bmp)$/i.test(f.name);
        const isPdf=/\.pdf$/i.test(f.name);
        const sizeMB = f.metadata?.size ? (f.metadata.size/1024/1024).toFixed(2)+' MB' : '';
        const preview = isImg
          ? `<div class="adj-preview"><img src="${f.signedUrl||''}" alt=""></div>`
          : `<div class="adj-preview"><span style="font-size:32px;color:#9ca3af;">${isPdf?'📄':'📁'}</span></div>`;
        const noteField = adjContext.bucket===ADJ_BUCKETS.cotizacion
          ? `<textarea class="adj-note-edit" placeholder="Nota" data-note-id="${notaObj.id||''}" data-path="${f.path}" onchange="guardarNotaAdj(this)">${notaObj.nota||''}</textarea>`
          : '';
        return `
          <div class="adj-card">
            ${preview}
            <div class="adj-name">${esc(f.name)}</div>
            <div class="adj-meta">${esc(f.metadata?.mimetype||'')} ${sizeMB?('· '+sizeMB):''}</div>
            ${noteField}
            <div class="adj-actions">
              ${f.signedUrl?`<a class="adj-smallbtn" href="${f.signedUrl}" target="_blank" rel="noopener">Ver/Descargar</a>`:''}
              <button class="adj-smallbtn danger" onclick="eliminarAdjunto('${attr(f.path)}')">Eliminar</button>
            </div>
          </div>
        `;
      }).join('');
      status.textContent=`${signed.length} archivo(s)`;
    }

    async function eliminarAdjunto(path){
      const sb=await waitForSupabase();
      try{
        await sb.storage.from(adjContext.bucket).remove([path]);
        if(adjContext.bucket===ADJ_BUCKETS.cotizacion){
          await sb.from('cotizacion_files')
            .delete()
            .eq('cotizacion_id', adjContext.cotId)
            .eq('path', path);
        }
        await cargarAdjuntos();
      }catch(e){
        console.error(e);
        toast('No se pudo eliminar: '+(e.message||''));
      }
    }

    async function guardarNotaAdj(textarea){
      const path=textarea.dataset.path;
      const noteId=textarea.dataset.noteId;
      const nota=textarea.value.trim();
      const [cotId]=path.split('/');
      const sb=await waitForSupabase();
      if(noteId){
        await sb.from('cotizacion_files').update({ nota }).eq('id', noteId);
      }else{
        await sb.from('cotizacion_files').insert({ cotizacion_id: cotId, path, filename:path.split('/').pop(), nota });
      }
    }

    function verCotizacion(id){ if(!id) return; window.location.href=`../cotizaciones/detalle.html?id=${id}`; }
  </script>
</body>
