<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BYT SOFTWARE - Inicio</title>

  <!-- Estilos globales y loader -->
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/loader.css">

  <!-- Config y helpers del menú -->
  <script src="../js/menuConfig.js"></script>
  <script src="../js/layout.js"></script>

  <style>
    body { margin: 0; background: var(--bg); color: var(--text); }
    /* Mensaje de bienvenida opcional */
    .home-welcome {
      padding: 24px;
      color: var(--muted);
      font-size: 16px;
    }
  </style>
</head>
<body>
  <script>
    // Carga el fragmento de layout y lo inserta en el body.
    // Así usamos el menú único definido en src/fragments/layout.html
    (async function loadLayout() {
      const res = await fetch('../fragments/layout.html');
      const html = await res.text();
      document.body.innerHTML = html;

      // Deja el slot vacío o con un mensaje ligero
      const slot = document.getElementById('page-content-slot');
      if (slot) {
        slot.innerHTML = `
          <div class="home-welcome">
            Selecciona una opción del menú para comenzar.
          </div>
        `;
      }
    })();
  </script>
</body>
</html>
